<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitchRank Weekly Rankings Update</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:'DM Sans',Arial,Helvetica,sans-serif;color:#1a1a1a;-webkit-text-size-adjust:100%;">

<!-- Wrapper -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;">
<tr><td align="center" style="padding:20px 10px;">

<!-- Container -->
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:8px;overflow:hidden;">

<!-- Header -->
<tr>
<td style="background-color:#0B5345;padding:24px 30px;text-align:center;">
  <h1 style="margin:0;font-family:'DM Sans',Arial,sans-serif;font-size:24px;font-weight:700;color:#ffffff;letter-spacing:0.5px;">PITCHRANK</h1>
  <p style="margin:6px 0 0;font-family:'DM Sans',Arial,sans-serif;font-size:14px;color:#F4D03F;letter-spacing:1px;">WEEKLY RANKINGS UPDATE</p>
  <p style="margin:4px 0 0;font-family:'DM Sans',Arial,sans-serif;font-size:12px;color:rgba(255,255,255,0.7);">$date_display</p>
</td>
</tr>

<!-- Blog Content -->
<tr>
<td style="padding:24px 30px;">
  $blog_content_html
</td>
</tr>

<!-- CTA -->
<tr>
<td style="padding:8px 30px 20px;text-align:center;">
  <a href="https://pitchrank.io/rankings" style="display:inline-block;padding:14px 32px;background-color:#F4D03F;color:#0B5345;font-size:16px;font-weight:700;text-decoration:none;border-radius:6px;letter-spacing:0.5px;">See Where Your Team Stands</a>
  $total_teams_line
</td>
</tr>

<!-- Engagement Hook (rotates weekly) -->
<tr>
<td style="padding:4px 30px 20px;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td style="padding:16px 20px;background-color:#f0faf7;border-left:3px solid #0B5345;border-radius:4px;">
        <p style="margin:0;font-size:14px;color:#0B5345;font-weight:600;">$engagement_hook</p>
      </td>
    </tr>
  </table>
</td>
</tr>

<!-- Share / Referral -->
<tr>
<td style="padding:4px 30px 24px;text-align:center;">
  <p style="margin:0;font-size:13px;color:#666;">Know a soccer parent who'd love this? <a href="https://pitchrank.io" style="color:#0B5345;font-weight:600;text-decoration:none;">Share PitchRank</a></p>
</td>
</tr>

<!-- Footer -->
<tr>
<td style="background-color:#0f1419;padding:20px 30px;text-align:center;">
  <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.6);">
    <a href="https://pitchrank.io" style="color:#F4D03F;text-decoration:none;">pitchrank.io</a>
    &nbsp;&middot;&nbsp;
    <a href="https://x.com/PitchRank" style="color:rgba(255,255,255,0.6);text-decoration:none;">X</a>
    &nbsp;&middot;&nbsp;
    <a href="https://instagram.com/PitchRank" style="color:rgba(255,255,255,0.6);text-decoration:none;">Instagram</a>
  </p>
  <p style="margin:8px 0 0;font-size:11px;color:rgba(255,255,255,0.4);">Rankings built from real game data, not opinions.</p>
</td>
</tr>

</table>
<!-- /Container -->

</td></tr>
</table>
<!-- /Wrapper -->

</body>
</html>
