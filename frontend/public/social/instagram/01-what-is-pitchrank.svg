<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brand gradient: 135deg from forest green to dark green (matches social-media-brand-package.html) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B5345"/>
      <stop offset="100%" stop-color="#052E27"/>
    </linearGradient>
    <!-- Scanline texture: repeating horizontal lines at 3% white opacity -->
    <pattern id="scanlines" x="0" y="0" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="white" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#scanlines)"/>

  <!-- ====== TOP: Logo with diagonal slash ====== -->
  <!-- Diagonal slash: 8px wide, skewX(-10), left of logo text -->
  <rect x="200" y="55" width="8" height="100" fill="#F4D03F" transform="skewX(-10)"/>
  <!-- Logo: Oswald ExtraBold (800), uppercase, letter-spacing 2 -->
  <text x="228" y="135" font-family="Oswald, sans-serif" font-weight="800" font-size="72" fill="#FDFEFE" letter-spacing="2">PITCHRANK</text>

  <!-- ====== CENTER: Main headline ====== -->
  <text x="540" y="280" font-family="Oswald, sans-serif" font-weight="800" font-size="64" fill="#FDFEFE" text-anchor="middle" letter-spacing="2">WHAT IS</text>
  <!-- Highlight word in yellow -->
  <text x="540" y="375" font-family="Oswald, sans-serif" font-weight="800" font-size="92" fill="#F4D03F" text-anchor="middle" letter-spacing="2">PITCHRANK?</text>

  <!-- Subtitle: DM Sans -->
  <text x="540" y="430" font-family="DM Sans, sans-serif" font-weight="500" font-size="28" fill="#FDFEFE" text-anchor="middle" opacity="0.85">Youth Soccer Rankings Powered by Data</text>

  <!-- ====== CONTENT: 4 feature rows ====== -->
  <!-- Row 1 -->
  <g transform="translate(140, 490)">
    <rect width="800" height="68" rx="8" fill="#FDFEFE" opacity="0.06"/>
    <rect x="18" y="18" width="32" height="32" rx="6" fill="#F4D03F" opacity="0.2"/>
    <text x="34" y="42" font-family="Oswald, sans-serif" font-weight="800" font-size="18" fill="#F4D03F" text-anchor="middle">1</text>
    <text x="68" y="43" font-family="DM Sans, sans-serif" font-weight="700" font-size="24" fill="#FDFEFE">Thousands of Teams Ranked Nationally</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(140, 572)">
    <rect width="800" height="68" rx="8" fill="#FDFEFE" opacity="0.06"/>
    <rect x="18" y="18" width="32" height="32" rx="6" fill="#F4D03F" opacity="0.2"/>
    <text x="34" y="42" font-family="Oswald, sans-serif" font-weight="800" font-size="18" fill="#F4D03F" text-anchor="middle">2</text>
    <text x="68" y="43" font-family="DM Sans, sans-serif" font-weight="700" font-size="24" fill="#FDFEFE">Data-Driven, Unbiased Algorithm</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(140, 654)">
    <rect width="800" height="68" rx="8" fill="#FDFEFE" opacity="0.06"/>
    <rect x="18" y="18" width="32" height="32" rx="6" fill="#F4D03F" opacity="0.2"/>
    <text x="34" y="42" font-family="Oswald, sans-serif" font-weight="800" font-size="18" fill="#F4D03F" text-anchor="middle">3</text>
    <text x="68" y="43" font-family="DM Sans, sans-serif" font-weight="700" font-size="24" fill="#FDFEFE">All Age Groups — Boys &amp; Girls</text>
  </g>

  <!-- Row 4 -->
  <g transform="translate(140, 736)">
    <rect width="800" height="68" rx="8" fill="#FDFEFE" opacity="0.06"/>
    <rect x="18" y="18" width="32" height="32" rx="6" fill="#F4D03F" opacity="0.2"/>
    <text x="34" y="42" font-family="Oswald, sans-serif" font-weight="800" font-size="18" fill="#F4D03F" text-anchor="middle">4</text>
    <text x="68" y="43" font-family="DM Sans, sans-serif" font-weight="700" font-size="24" fill="#FDFEFE">Updated Weekly with Real Match Data</text>
  </g>

  <!-- ====== CTA ====== -->
  <text x="540" y="885" font-family="Oswald, sans-serif" font-weight="800" font-size="30" fill="#F4D03F" text-anchor="middle" letter-spacing="2">SEE WHERE YOUR TEAM STANDS</text>
  <text x="540" y="925" font-family="DM Sans, sans-serif" font-weight="500" font-size="22" fill="#FDFEFE" text-anchor="middle" opacity="0.6">pitchrank.io/rankings</text>

  <!-- ====== BOTTOM BAR ====== -->
  <rect x="0" y="975" width="1080" height="105" fill="#052E27" opacity="0.7"/>
  <!-- Diagonal slash in bottom bar -->
  <rect x="385" y="998" width="8" height="60" fill="#F4D03F" transform="skewX(-10)"/>
  <!-- Alternative logo: PITCH (white) + RANK (yellow) -->
  <text x="415" y="1044" font-family="Oswald, sans-serif" font-weight="800" font-size="42" letter-spacing="2">
    <tspan fill="#FDFEFE">PITCH</tspan><tspan fill="#F4D03F">RANK</tspan>
  </text>
</svg>
