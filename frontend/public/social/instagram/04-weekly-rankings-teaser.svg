<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B5345"/>
      <stop offset="100%" stop-color="#052E27"/>
    </linearGradient>
    <pattern id="scanlines" x="0" y="0" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="white" opacity="0.03"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#scanlines)"/>

  <!-- ====== TOP: Logo with diagonal slash ====== -->
  <rect x="200" y="55" width="8" height="100" fill="#F4D03F" transform="skewX(-10)"/>
  <text x="228" y="135" font-family="Oswald, sans-serif" font-weight="800" font-size="72" fill="#FDFEFE" letter-spacing="2">PITCHRANK</text>

  <!-- ====== HEADLINE ====== -->
  <text x="540" y="255" font-family="Oswald, sans-serif" font-weight="800" font-size="80" fill="#FDFEFE" text-anchor="middle" letter-spacing="3">WEEKLY</text>
  <text x="540" y="350" font-family="Oswald, sans-serif" font-weight="800" font-size="80" fill="#F4D03F" text-anchor="middle" letter-spacing="3">RANKINGS</text>

  <!-- Subtitle -->
  <text x="540" y="400" font-family="DM Sans, sans-serif" font-weight="500" font-size="26" fill="#FDFEFE" text-anchor="middle" opacity="0.6">Updated Every Monday</text>

  <!-- ====== CENTER VISUAL: Soccer ball with orbiting rank numbers ====== -->
  <g transform="translate(540, 580)">
    <!-- Orbital ring -->
    <ellipse cx="0" cy="0" rx="200" ry="200" fill="none" stroke="#F4D03F" stroke-width="1" opacity="0.15" stroke-dasharray="8 6"/>
    <ellipse cx="0" cy="0" rx="140" ry="140" fill="none" stroke="#F4D03F" stroke-width="1" opacity="0.1" stroke-dasharray="6 8"/>

    <!-- Central soccer ball (geometric) -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#F4D03F" stroke-width="2.5" opacity="0.8"/>
    <!-- Pentagon pattern on ball -->
    <polygon points="0,-22 -21,-7 -13,18 13,18 21,-7" fill="none" stroke="#F4D03F" stroke-width="1.5" opacity="0.5"/>
    <!-- Small inner lines -->
    <line x1="0" y1="-22" x2="0" y2="-50" stroke="#F4D03F" stroke-width="1" opacity="0.3"/>
    <line x1="-21" y1="-7" x2="-48" y2="-15" stroke="#F4D03F" stroke-width="1" opacity="0.3"/>
    <line x1="21" y1="-7" x2="48" y2="-15" stroke="#F4D03F" stroke-width="1" opacity="0.3"/>
    <line x1="-13" y1="18" x2="-30" y2="40" stroke="#F4D03F" stroke-width="1" opacity="0.3"/>
    <line x1="13" y1="18" x2="30" y2="40" stroke="#F4D03F" stroke-width="1" opacity="0.3"/>

    <!-- Orbiting rank badges -->
    <!-- #1 (top) with up arrow -->
    <g transform="translate(0, -195)">
      <circle r="28" fill="#F4D03F" opacity="0.2"/>
      <circle r="24" fill="none" stroke="#F4D03F" stroke-width="2"/>
      <text y="8" font-family="Oswald, sans-serif" font-weight="800" font-size="22" fill="#F4D03F" text-anchor="middle">#1</text>
      <!-- Up arrow -->
      <polygon points="40,-8 40,8 52,0" fill="#22C55E" opacity="0.8"/>
    </g>

    <!-- #3 (right) with up arrow -->
    <g transform="translate(190, -60)">
      <circle r="24" fill="#F4D03F" opacity="0.15"/>
      <circle r="20" fill="none" stroke="#F4D03F" stroke-width="1.5"/>
      <text y="7" font-family="Oswald, sans-serif" font-weight="800" font-size="18" fill="#F4D03F" text-anchor="middle">#3</text>
      <polygon points="34,-6 34,6 44,0" fill="#22C55E" opacity="0.7"/>
    </g>

    <!-- #5 (bottom-right) with down arrow -->
    <g transform="translate(140, 145)">
      <circle r="22" fill="#F4D03F" opacity="0.12"/>
      <circle r="18" fill="none" stroke="#F4D03F" stroke-width="1.5"/>
      <text y="6" font-family="Oswald, sans-serif" font-weight="800" font-size="16" fill="#F4D03F" text-anchor="middle">#5</text>
      <polygon points="30,-5 30,5 40,0" fill="#EF4444" opacity="0.7" transform="rotate(180, 35, 0)"/>
    </g>

    <!-- #8 (bottom-left) with up arrow -->
    <g transform="translate(-160, 120)">
      <circle r="20" fill="#F4D03F" opacity="0.1"/>
      <circle r="17" fill="none" stroke="#F4D03F" stroke-width="1.5"/>
      <text y="6" font-family="Oswald, sans-serif" font-weight="800" font-size="15" fill="#F4D03F" text-anchor="middle">#8</text>
      <polygon points="-30,-5 -30,5 -40,0" fill="#22C55E" opacity="0.6"/>
    </g>

    <!-- #12 (left) with down arrow -->
    <g transform="translate(-195, -40)">
      <circle r="22" fill="#F4D03F" opacity="0.1"/>
      <circle r="18" fill="none" stroke="#F4D03F" stroke-width="1.5"/>
      <text y="6" font-family="Oswald, sans-serif" font-weight="800" font-size="16" fill="#F4D03F" text-anchor="middle">#12</text>
      <polygon points="-32,-5 -32,5 -42,0" fill="#EF4444" opacity="0.6"/>
    </g>
  </g>

  <!-- ====== Who's rising / Who's falling ====== -->
  <g transform="translate(540, 830)">
    <text x="-120" y="0" font-family="Oswald, sans-serif" font-weight="800" font-size="30" fill="#22C55E" text-anchor="middle" letter-spacing="1">WHO'S RISING?</text>
    <text x="120" y="0" font-family="Oswald, sans-serif" font-weight="800" font-size="30" fill="#EF4444" text-anchor="middle" letter-spacing="1">WHO'S FALLING?</text>
  </g>

  <!-- ====== CTA ====== -->
  <text x="540" y="895" font-family="Oswald, sans-serif" font-weight="800" font-size="26" fill="#F4D03F" text-anchor="middle" letter-spacing="2">STAY TUNED</text>
  <text x="540" y="930" font-family="DM Sans, sans-serif" font-weight="500" font-size="22" fill="#FDFEFE" text-anchor="middle" opacity="0.6">pitchrank.io</text>

  <!-- ====== BOTTOM BAR ====== -->
  <rect x="0" y="975" width="1080" height="105" fill="#052E27" opacity="0.7"/>
  <rect x="385" y="998" width="8" height="60" fill="#F4D03F" transform="skewX(-10)"/>
  <text x="415" y="1044" font-family="Oswald, sans-serif" font-weight="800" font-size="42" letter-spacing="2">
    <tspan fill="#FDFEFE">PITCH</tspan><tspan fill="#F4D03F">RANK</tspan>
  </text>
</svg>
