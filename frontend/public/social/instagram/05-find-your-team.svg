<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B5345"/>
      <stop offset="100%" stop-color="#052E27"/>
    </linearGradient>
    <pattern id="scanlines" x="0" y="0" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="white" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#scanlines)"/>

  <!-- ====== TOP: Logo with diagonal slash ====== -->
  <rect x="200" y="55" width="8" height="100" fill="#F4D03F" transform="skewX(-10)"/>
  <text x="228" y="135" font-family="Oswald, sans-serif" font-weight="800" font-size="72" fill="#FDFEFE" letter-spacing="2">PITCHRANK</text>

  <!-- ====== HEADLINE ====== -->
  <text x="540" y="250" font-family="Oswald, sans-serif" font-weight="800" font-size="72" fill="#FDFEFE" text-anchor="middle" letter-spacing="2">FIND YOUR</text>
  <text x="540" y="335" font-family="Oswald, sans-serif" font-weight="800" font-size="72" fill="#F4D03F" text-anchor="middle" letter-spacing="2">TEAM'S RANK</text>

  <!-- ====== SEARCH BAR ====== -->
  <g transform="translate(140, 380)">
    <rect width="800" height="65" rx="10" fill="#FDFEFE" opacity="0.06" stroke="#F4D03F" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- Search icon -->
    <circle cx="42" cy="32" r="12" fill="none" stroke="#F4D03F" stroke-width="2" opacity="0.6"/>
    <line x1="51" y1="41" x2="60" y2="50" stroke="#F4D03F" stroke-width="2" opacity="0.6"/>
    <!-- Placeholder text -->
    <text x="78" y="38" font-family="DM Sans, sans-serif" font-weight="500" font-size="22" fill="#FDFEFE" opacity="0.35">Search for your team...</text>
  </g>

  <!-- ====== RANKING RESULTS ====== -->
  <!-- Result 1 -->
  <g transform="translate(140, 470)">
    <rect width="800" height="75" rx="8" fill="#FDFEFE" opacity="0.06"/>
    <!-- Rank badge -->
    <rect x="15" y="15" width="45" height="45" rx="8" fill="#F4D03F" opacity="0.15"/>
    <text x="37" y="46" font-family="Oswald, sans-serif" font-weight="800" font-size="22" fill="#F4D03F" text-anchor="middle">#1</text>
    <!-- Team info -->
    <text x="78" y="36" font-family="Oswald, sans-serif" font-weight="800" font-size="22" fill="#FDFEFE" letter-spacing="1">FC DALLAS YOUTH 2014B ECNL</text>
    <text x="78" y="58" font-family="DM Sans, sans-serif" font-weight="500" font-size="16" fill="#FDFEFE" opacity="0.5">U12 Boys · Texas · ECNL</text>
    <!-- PowerScore -->
    <rect x="650" y="16" width="120" height="42" rx="8" fill="#F4D03F" opacity="0.12"/>
    <text x="710" y="32" font-family="Oswald, sans-serif" font-weight="800" font-size="11" fill="#F4D03F" text-anchor="middle" letter-spacing="1">POWER</text>
    <text x="710" y="52" font-family="Oswald, sans-serif" font-weight="800" font-size="20" fill="#F4D03F" text-anchor="middle">0.96</text>
  </g>

  <!-- Result 2 -->
  <g transform="translate(140, 558)">
    <rect width="800" height="75" rx="8" fill="#FDFEFE" opacity="0.05"/>
    <rect x="15" y="15" width="45" height="45" rx="8" fill="#F4D03F" opacity="0.12"/>
    <text x="37" y="46" font-family="Oswald, sans-serif" font-weight="800" font-size="22" fill="#F4D03F" text-anchor="middle" opacity="0.85">#2</text>
    <text x="78" y="36" font-family="Oswald, sans-serif" font-weight="800" font-size="22" fill="#FDFEFE" letter-spacing="1">REAL SALT LAKE AZ 2013G ECNL</text>
    <text x="78" y="58" font-family="DM Sans, sans-serif" font-weight="500" font-size="16" fill="#FDFEFE" opacity="0.5">U13 Girls · Arizona · ECNL</text>
    <rect x="650" y="16" width="120" height="42" rx="8" fill="#F4D03F" opacity="0.1"/>
    <text x="710" y="32" font-family="Oswald, sans-serif" font-weight="800" font-size="11" fill="#F4D03F" text-anchor="middle" letter-spacing="1" opacity="0.8">POWER</text>
    <text x="710" y="52" font-family="Oswald, sans-serif" font-weight="800" font-size="20" fill="#F4D03F" text-anchor="middle" opacity="0.8">0.93</text>
  </g>

  <!-- Result 3 -->
  <g transform="translate(140, 646)">
    <rect width="800" height="75" rx="8" fill="#FDFEFE" opacity="0.04"/>
    <rect x="15" y="15" width="45" height="45" rx="8" fill="#F4D03F" opacity="0.1"/>
    <text x="37" y="46" font-family="Oswald, sans-serif" font-weight="800" font-size="22" fill="#F4D03F" text-anchor="middle" opacity="0.7">#3</text>
    <text x="78" y="36" font-family="Oswald, sans-serif" font-weight="800" font-size="22" fill="#FDFEFE" letter-spacing="1">SURF SC 2015B ECNL-RL</text>
    <text x="78" y="58" font-family="DM Sans, sans-serif" font-weight="500" font-size="16" fill="#FDFEFE" opacity="0.5">U11 Boys · California · ECNL-RL</text>
    <rect x="650" y="16" width="120" height="42" rx="8" fill="#F4D03F" opacity="0.08"/>
    <text x="710" y="32" font-family="Oswald, sans-serif" font-weight="800" font-size="11" fill="#F4D03F" text-anchor="middle" letter-spacing="1" opacity="0.6">POWER</text>
    <text x="710" y="52" font-family="Oswald, sans-serif" font-weight="800" font-size="20" fill="#F4D03F" text-anchor="middle" opacity="0.6">0.91</text>
  </g>

  <!-- More teams hint -->
  <g transform="translate(140, 734)">
    <rect width="800" height="50" rx="8" fill="#FDFEFE" opacity="0.03"/>
    <text x="400" y="32" font-family="DM Sans, sans-serif" font-weight="500" font-size="18" fill="#FDFEFE" text-anchor="middle" opacity="0.3">+ thousands more teams...</text>
  </g>

  <!-- ====== CTA BUTTON ====== -->
  <g transform="translate(340, 825)">
    <rect width="400" height="60" rx="8" fill="#F4D03F"/>
    <text x="200" y="40" font-family="Oswald, sans-serif" font-weight="800" font-size="26" fill="#052E27" text-anchor="middle" letter-spacing="2">SEARCH RANKINGS FREE</text>
  </g>

  <!-- Subtitle -->
  <text x="540" y="925" font-family="DM Sans, sans-serif" font-weight="500" font-size="22" fill="#FDFEFE" text-anchor="middle" opacity="0.5">Parents, players, and coaches — find your team instantly</text>

  <!-- ====== BOTTOM BAR ====== -->
  <rect x="0" y="975" width="1080" height="105" fill="#052E27" opacity="0.7"/>
  <rect x="385" y="998" width="8" height="60" fill="#F4D03F" transform="skewX(-10)"/>
  <text x="415" y="1044" font-family="Oswald, sans-serif" font-weight="800" font-size="42" letter-spacing="2">
    <tspan fill="#FDFEFE">PITCH</tspan><tspan fill="#F4D03F">RANK</tspan>
  </text>
</svg>
