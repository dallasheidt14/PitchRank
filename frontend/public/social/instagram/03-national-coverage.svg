<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B5345"/>
      <stop offset="100%" stop-color="#052E27"/>
    </linearGradient>
    <pattern id="scanlines" x="0" y="0" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="white" opacity="0.03"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#scanlines)"/>

  <!-- ====== TOP: Logo with diagonal slash ====== -->
  <rect x="200" y="55" width="8" height="100" fill="#F4D03F" transform="skewX(-10)"/>
  <text x="228" y="135" font-family="Oswald, sans-serif" font-weight="800" font-size="72" fill="#FDFEFE" letter-spacing="2">PITCHRANK</text>

  <!-- ====== HEADLINE ====== -->
  <text x="540" y="235" font-family="Oswald, sans-serif" font-weight="800" font-size="42" fill="#FDFEFE" text-anchor="middle" letter-spacing="2">YOUTH SOCCER RANKINGS</text>
  <text x="540" y="295" font-family="Oswald, sans-serif" font-weight="800" font-size="52" fill="#F4D03F" text-anchor="middle" letter-spacing="2">ACROSS THE COUNTRY</text>

  <!-- ====== US MAP (simplified outline with data points) ====== -->
  <g transform="translate(140, 320)">
    <!-- Simplified US continental outline -->
    <path d="M80,180 L100,120 L130,100 L180,90 L220,95 L260,80 L300,70 L330,60 L360,55 L400,50 L440,45 L480,42 L520,40 L560,42 L600,50 L630,55 L650,48 L680,50 L700,60 L720,70 L740,80 L740,100 L730,120 L720,140 L710,165 L700,185 L680,200 L660,220 L640,240 L630,260 L620,240 L600,230 L580,235 L560,240 L540,250 L520,260 L500,265 L480,260 L460,250 L440,248 L420,252 L400,260 L380,265 L360,268 L340,270 L320,265 L300,260 L280,258 L260,260 L240,265 L220,260 L200,250 L180,240 L160,230 L140,222 L120,215 L100,210 L80,200 Z"
      fill="none" stroke="#F4D03F" stroke-width="1.5" opacity="0.3"/>

    <!-- Glowing data points: major soccer markets -->
    <!-- Glow layer (behind) -->
    <circle cx="680" cy="130" r="16" fill="#F4D03F" opacity="0.08" filter="url(#softGlow)"/>
    <circle cx="180" cy="210" r="16" fill="#F4D03F" opacity="0.08" filter="url(#softGlow)"/>
    <circle cx="480" cy="250" r="16" fill="#F4D03F" opacity="0.08" filter="url(#softGlow)"/>
    <circle cx="630" cy="230" r="16" fill="#F4D03F" opacity="0.08" filter="url(#softGlow)"/>

    <!-- Data points -->
    <!-- West Coast -->
    <circle cx="100" cy="140" r="6" fill="#F4D03F" opacity="0.8" filter="url(#glow)"/>
    <circle cx="110" cy="180" r="8" fill="#F4D03F" opacity="0.9" filter="url(#glow)"/>
    <circle cx="120" cy="210" r="5" fill="#F4D03F" opacity="0.7" filter="url(#glow)"/>
    <circle cx="160" cy="200" r="4" fill="#F4D03F" opacity="0.6"/>
    <circle cx="180" cy="210" r="7" fill="#F4D03F" opacity="0.85" filter="url(#glow)"/>

    <!-- Mountain West -->
    <circle cx="200" cy="130" r="4" fill="#F4D03F" opacity="0.5"/>
    <circle cx="240" cy="150" r="5" fill="#F4D03F" opacity="0.6"/>
    <circle cx="270" cy="180" r="4" fill="#F4D03F" opacity="0.5"/>
    <circle cx="300" cy="120" r="3" fill="#F4D03F" opacity="0.4"/>

    <!-- Texas -->
    <circle cx="380" cy="240" r="8" fill="#F4D03F" opacity="0.9" filter="url(#glow)"/>
    <circle cx="400" cy="260" r="6" fill="#F4D03F" opacity="0.75" filter="url(#glow)"/>
    <circle cx="360" cy="250" r="5" fill="#F4D03F" opacity="0.65"/>
    <circle cx="420" cy="250" r="4" fill="#F4D03F" opacity="0.55"/>

    <!-- Midwest -->
    <circle cx="440" cy="110" r="5" fill="#F4D03F" opacity="0.6"/>
    <circle cx="480" cy="100" r="6" fill="#F4D03F" opacity="0.7" filter="url(#glow)"/>
    <circle cx="520" cy="120" r="4" fill="#F4D03F" opacity="0.5"/>
    <circle cx="500" cy="140" r="5" fill="#F4D03F" opacity="0.6"/>

    <!-- Southeast / Florida -->
    <circle cx="580" cy="235" r="5" fill="#F4D03F" opacity="0.7"/>
    <circle cx="620" cy="240" r="7" fill="#F4D03F" opacity="0.85" filter="url(#glow)"/>
    <circle cx="630" cy="260" r="6" fill="#F4D03F" opacity="0.75" filter="url(#glow)"/>
    <circle cx="640" cy="230" r="4" fill="#F4D03F" opacity="0.6"/>

    <!-- Northeast -->
    <circle cx="660" cy="80" r="7" fill="#F4D03F" opacity="0.85" filter="url(#glow)"/>
    <circle cx="680" cy="90" r="5" fill="#F4D03F" opacity="0.7"/>
    <circle cx="700" cy="75" r="6" fill="#F4D03F" opacity="0.8" filter="url(#glow)"/>
    <circle cx="720" cy="85" r="4" fill="#F4D03F" opacity="0.6"/>
    <circle cx="690" cy="100" r="5" fill="#F4D03F" opacity="0.65"/>

    <!-- Mid-Atlantic -->
    <circle cx="660" cy="130" r="6" fill="#F4D03F" opacity="0.75" filter="url(#glow)"/>
    <circle cx="640" cy="150" r="5" fill="#F4D03F" opacity="0.65"/>

    <!-- Scattered smaller dots -->
    <circle cx="320" cy="100" r="3" fill="#F4D03F" opacity="0.35"/>
    <circle cx="550" cy="160" r="3" fill="#F4D03F" opacity="0.35"/>
    <circle cx="460" cy="180" r="3" fill="#F4D03F" opacity="0.35"/>
    <circle cx="340" cy="160" r="3" fill="#F4D03F" opacity="0.3"/>
    <circle cx="580" cy="190" r="3" fill="#F4D03F" opacity="0.3"/>
  </g>

  <!-- ====== STAT BOXES ====== -->
  <!-- Box 1 -->
  <g transform="translate(80, 660)">
    <rect width="220" height="90" rx="8" fill="#FDFEFE" opacity="0.06"/>
    <text x="110" y="40" font-family="Oswald, sans-serif" font-weight="800" font-size="26" fill="#F4D03F" text-anchor="middle" letter-spacing="1">THOUSANDS</text>
    <text x="110" y="68" font-family="DM Sans, sans-serif" font-weight="500" font-size="18" fill="#FDFEFE" text-anchor="middle" opacity="0.6">of teams ranked</text>
  </g>

  <!-- Box 2 -->
  <g transform="translate(318, 660)">
    <rect width="200" height="90" rx="8" fill="#FDFEFE" opacity="0.06"/>
    <text x="100" y="40" font-family="Oswald, sans-serif" font-weight="800" font-size="26" fill="#F4D03F" text-anchor="middle" letter-spacing="1">U10–U18</text>
    <text x="100" y="68" font-family="DM Sans, sans-serif" font-weight="500" font-size="18" fill="#FDFEFE" text-anchor="middle" opacity="0.6">age groups</text>
  </g>

  <!-- Box 3 -->
  <g transform="translate(536, 660)">
    <rect width="220" height="90" rx="8" fill="#FDFEFE" opacity="0.06"/>
    <text x="110" y="40" font-family="Oswald, sans-serif" font-weight="800" font-size="26" fill="#F4D03F" text-anchor="middle" letter-spacing="1">BOYS &amp; GIRLS</text>
    <text x="110" y="68" font-family="DM Sans, sans-serif" font-weight="500" font-size="18" fill="#FDFEFE" text-anchor="middle" opacity="0.6">divisions</text>
  </g>

  <!-- Box 4 -->
  <g transform="translate(774, 660)">
    <rect width="220" height="90" rx="8" fill="#FDFEFE" opacity="0.06"/>
    <text x="110" y="40" font-family="Oswald, sans-serif" font-weight="800" font-size="26" fill="#F4D03F" text-anchor="middle" letter-spacing="1">WEEKLY</text>
    <text x="110" y="68" font-family="DM Sans, sans-serif" font-weight="500" font-size="18" fill="#FDFEFE" text-anchor="middle" opacity="0.6">updates</text>
  </g>

  <!-- ====== CTA ====== -->
  <text x="540" y="850" font-family="Oswald, sans-serif" font-weight="800" font-size="30" fill="#F4D03F" text-anchor="middle" letter-spacing="2">FIND YOUR TEAM</text>
  <text x="540" y="890" font-family="DM Sans, sans-serif" font-weight="500" font-size="22" fill="#FDFEFE" text-anchor="middle" opacity="0.6">pitchrank.io/rankings</text>

  <!-- ====== BOTTOM BAR ====== -->
  <rect x="0" y="975" width="1080" height="105" fill="#052E27" opacity="0.7"/>
  <rect x="385" y="998" width="8" height="60" fill="#F4D03F" transform="skewX(-10)"/>
  <text x="415" y="1044" font-family="Oswald, sans-serif" font-weight="800" font-size="42" letter-spacing="2">
    <tspan fill="#FDFEFE">PITCH</tspan><tspan fill="#F4D03F">RANK</tspan>
  </text>
</svg>
