<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B5345"/>
      <stop offset="100%" stop-color="#052E27"/>
    </linearGradient>
    <pattern id="scanlines" x="0" y="0" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="white" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#scanlines)"/>

  <!-- ====== TOP: Logo with diagonal slash ====== -->
  <rect x="200" y="55" width="8" height="100" fill="#F4D03F" transform="skewX(-10)"/>
  <text x="228" y="135" font-family="Oswald, sans-serif" font-weight="800" font-size="72" fill="#FDFEFE" letter-spacing="2">PITCHRANK</text>

  <!-- ====== HEADLINE ====== -->
  <text x="540" y="240" font-family="Oswald, sans-serif" font-weight="800" font-size="52" fill="#FDFEFE" text-anchor="middle" letter-spacing="2">HOW</text>
  <text x="540" y="310" font-family="Oswald, sans-serif" font-weight="800" font-size="64" fill="#F4D03F" text-anchor="middle" letter-spacing="2">RANKINGS WORK</text>

  <!-- ====== STEP 1: Data Collection ====== -->
  <g transform="translate(100, 360)">
    <!-- Step number badge -->
    <rect x="0" y="0" width="46" height="46" rx="23" fill="#F4D03F" opacity="0.2"/>
    <text x="23" y="31" font-family="Oswald, sans-serif" font-weight="800" font-size="22" fill="#F4D03F" text-anchor="middle">1</text>
    <!-- Step content -->
    <text x="62" y="22" font-family="Oswald, sans-serif" font-weight="800" font-size="24" fill="#FDFEFE" letter-spacing="1">DATA COLLECTION</text>
    <text x="62" y="44" font-family="DM Sans, sans-serif" font-weight="500" font-size="18" fill="#FDFEFE" opacity="0.6">Real match results scraped weekly from multiple sources</text>
  </g>

  <!-- Connector arrow -->
  <rect x="122" y="416" width="3" height="30" fill="#F4D03F" opacity="0.4"/>
  <polygon points="123,446 117,436 129,436" fill="#F4D03F" opacity="0.4"/>

  <!-- ====== STEP 2: 13-Layer Algorithm (expanded) ====== -->
  <g transform="translate(100, 455)">
    <rect x="0" y="0" width="46" height="46" rx="23" fill="#F4D03F" opacity="0.2"/>
    <text x="23" y="31" font-family="Oswald, sans-serif" font-weight="800" font-size="22" fill="#F4D03F" text-anchor="middle">2</text>
    <text x="62" y="22" font-family="Oswald, sans-serif" font-weight="800" font-size="24" fill="#FDFEFE" letter-spacing="1">13-LAYER RANKING ALGORITHM</text>
    <text x="62" y="44" font-family="DM Sans, sans-serif" font-weight="500" font-size="18" fill="#FDFEFE" opacity="0.6">V53e engine + machine learning refinement</text>

    <!-- Layer pills -->
    <g transform="translate(62, 58)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="115" height="30" rx="15" fill="none" stroke="#F4D03F" stroke-width="1.5" opacity="0.6"/>
      <text x="57" y="20" font-family="Oswald, sans-serif" font-weight="600" font-size="13" fill="#F4D03F" text-anchor="middle" opacity="0.9">OFFENSE</text>

      <rect x="125" y="0" width="115" height="30" rx="15" fill="none" stroke="#F4D03F" stroke-width="1.5" opacity="0.6"/>
      <text x="182" y="20" font-family="Oswald, sans-serif" font-weight="600" font-size="13" fill="#F4D03F" text-anchor="middle" opacity="0.9">DEFENSE</text>

      <rect x="250" y="0" width="115" height="30" rx="15" fill="none" stroke="#F4D03F" stroke-width="1.5" opacity="0.6"/>
      <text x="307" y="20" font-family="Oswald, sans-serif" font-weight="600" font-size="13" fill="#F4D03F" text-anchor="middle" opacity="0.9">RECENCY</text>

      <rect x="375" y="0" width="115" height="30" rx="15" fill="none" stroke="#F4D03F" stroke-width="1.5" opacity="0.6"/>
      <text x="432" y="20" font-family="Oswald, sans-serif" font-weight="600" font-size="13" fill="#F4D03F" text-anchor="middle" opacity="0.9">SOS</text>

      <!-- Row 2 -->
      <rect x="0" y="38" width="115" height="30" rx="15" fill="none" stroke="#F4D03F" stroke-width="1.5" opacity="0.6"/>
      <text x="57" y="58" font-family="Oswald, sans-serif" font-weight="600" font-size="13" fill="#F4D03F" text-anchor="middle" opacity="0.9">BAYESIAN</text>

      <rect x="125" y="38" width="115" height="30" rx="15" fill="none" stroke="#F4D03F" stroke-width="1.5" opacity="0.6"/>
      <text x="182" y="58" font-family="Oswald, sans-serif" font-weight="600" font-size="13" fill="#F4D03F" text-anchor="middle" opacity="0.9">ADAPTIVE K</text>

      <rect x="250" y="38" width="150" height="30" rx="15" fill="#F4D03F" opacity="0.15" stroke="#F4D03F" stroke-width="1.5" stroke-opacity="0.8"/>
      <text x="325" y="58" font-family="Oswald, sans-serif" font-weight="600" font-size="13" fill="#F4D03F" text-anchor="middle">ML LAYER 13</text>

      <rect x="410" y="38" width="80" height="30" rx="15" fill="none" stroke="#F4D03F" stroke-width="1.5" opacity="0.4"/>
      <text x="450" y="58" font-family="Oswald, sans-serif" font-weight="600" font-size="13" fill="#F4D03F" text-anchor="middle" opacity="0.6">+6 MORE</text>
    </g>
  </g>

  <!-- Connector arrow -->
  <rect x="122" y="590" width="3" height="30" fill="#F4D03F" opacity="0.4"/>
  <polygon points="123,620 117,610 129,610" fill="#F4D03F" opacity="0.4"/>

  <!-- ====== STEP 3: PowerScore Output ====== -->
  <g transform="translate(100, 630)">
    <rect x="0" y="0" width="46" height="46" rx="23" fill="#F4D03F" opacity="0.2"/>
    <text x="23" y="31" font-family="Oswald, sans-serif" font-weight="800" font-size="22" fill="#F4D03F" text-anchor="middle">3</text>
    <text x="62" y="22" font-family="Oswald, sans-serif" font-weight="800" font-size="24" fill="#FDFEFE" letter-spacing="1">POWERSCORE OUTPUT</text>
    <text x="62" y="44" font-family="DM Sans, sans-serif" font-weight="500" font-size="18" fill="#FDFEFE" opacity="0.6">Every team gets a score from 0.00 to 1.00</text>

    <!-- Score badge -->
    <rect x="680" y="-2" width="100" height="48" rx="24" fill="#F4D03F" opacity="0.15" stroke="#F4D03F" stroke-width="2"/>
    <text x="730" y="32" font-family="Oswald, sans-serif" font-weight="800" font-size="26" fill="#F4D03F" text-anchor="middle">0.94</text>
  </g>

  <!-- Connector arrow -->
  <rect x="122" y="690" width="3" height="30" fill="#F4D03F" opacity="0.4"/>
  <polygon points="123,720 117,710 129,710" fill="#F4D03F" opacity="0.4"/>

  <!-- ====== STEP 4: Rankings Published ====== -->
  <g transform="translate(100, 730)">
    <rect x="0" y="0" width="46" height="46" rx="23" fill="#F4D03F" opacity="0.2"/>
    <text x="23" y="31" font-family="Oswald, sans-serif" font-weight="800" font-size="22" fill="#F4D03F" text-anchor="middle">4</text>
    <text x="62" y="22" font-family="Oswald, sans-serif" font-weight="800" font-size="24" fill="#FDFEFE" letter-spacing="1">RANKINGS PUBLISHED</text>
    <text x="62" y="44" font-family="DM Sans, sans-serif" font-weight="500" font-size="18" fill="#FDFEFE" opacity="0.6">State &amp; national rankings updated every Monday</text>
  </g>

  <!-- ====== TAGLINE ====== -->
  <text x="540" y="860" font-family="DM Sans, sans-serif" font-weight="700" font-size="28" fill="#FDFEFE" text-anchor="middle" opacity="0.7">No bias. No politics. Just math.</text>

  <!-- ====== CTA ====== -->
  <text x="540" y="920" font-family="Oswald, sans-serif" font-weight="800" font-size="28" fill="#F4D03F" text-anchor="middle" letter-spacing="2">LEARN MORE AT PITCHRANK.IO</text>

  <!-- ====== BOTTOM BAR ====== -->
  <rect x="0" y="975" width="1080" height="105" fill="#052E27" opacity="0.7"/>
  <rect x="385" y="998" width="8" height="60" fill="#F4D03F" transform="skewX(-10)"/>
  <text x="415" y="1044" font-family="Oswald, sans-serif" font-weight="800" font-size="42" letter-spacing="2">
    <tspan fill="#FDFEFE">PITCH</tspan><tspan fill="#F4D03F">RANK</tspan>
  </text>
</svg>
