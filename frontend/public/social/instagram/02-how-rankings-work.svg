<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052E27"/>
      <stop offset="40%" stop-color="#0B5345"/>
      <stop offset="100%" stop-color="#041F1A"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D6B58" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#052E27" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines2" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="white" opacity="0.03"/>
    </pattern>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#F4D03F" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad2)"/>
  <rect width="1080" height="1080" fill="url(#scanlines2)"/>
  <rect width="1080" height="1080" fill="url(#dots)"/>

  <!-- Decorative diagonals -->
  <rect x="60" y="60" width="10" height="120" fill="#F4D03F" transform="skewX(-12)" opacity="0.8"/>
  <rect x="82" y="75" width="5" height="80" fill="#F4D03F" transform="skewX(-12)" opacity="0.35"/>

  <!-- Title -->
  <text x="540" y="115" font-family="Oswald, sans-serif" font-weight="600" font-size="38" fill="#F4D03F" text-anchor="middle" letter-spacing="10" opacity="0.8">THE SCIENCE BEHIND</text>
  <text x="540" y="185" font-family="Oswald, sans-serif" font-weight="700" font-size="80" fill="#FDFEFE" text-anchor="middle" letter-spacing="3">HOW RANKINGS WORK</text>

  <!-- Yellow divider -->
  <rect x="340" y="210" width="400" height="4" rx="2" fill="#F4D03F" opacity="0.7"/>

  <!-- Step 1: Data Collection -->
  <g transform="translate(80, 260)">
    <rect width="420" height="155" rx="12" fill="url(#cardGrad)" stroke="#F4D03F" stroke-width="1" stroke-opacity="0.2"/>
    <!-- Step number -->
    <circle cx="45" cy="40" r="22" fill="#F4D03F" opacity="0.15"/>
    <text x="45" y="48" font-family="Oswald, sans-serif" font-weight="700" font-size="26" fill="#F4D03F" text-anchor="middle">1</text>
    <!-- Icon: database/stack -->
    <rect x="350" y="25" width="40" height="10" rx="3" fill="#F4D03F" opacity="0.5"/>
    <rect x="350" y="42" width="40" height="10" rx="3" fill="#F4D03F" opacity="0.4"/>
    <rect x="350" y="59" width="40" height="10" rx="3" fill="#F4D03F" opacity="0.3"/>
    <!-- Text -->
    <text x="80" y="47" font-family="Oswald, sans-serif" font-weight="600" font-size="26" fill="#FDFEFE" letter-spacing="1">DATA COLLECTION</text>
    <text x="25" y="85" font-family="DM Sans, sans-serif" font-size="19" fill="#FDFEFE" opacity="0.7">Real match results scraped from</text>
    <text x="25" y="112" font-family="DM Sans, sans-serif" font-size="19" fill="#FDFEFE" opacity="0.7">multiple tournament providers weekly</text>
    <text x="25" y="140" font-family="DM Sans, sans-serif" font-size="17" fill="#F4D03F" opacity="0.6">365-day rolling window</text>
  </g>

  <!-- Arrow connector -->
  <path d="M540,420 L540,445" stroke="#F4D03F" stroke-width="2" opacity="0.5"/>
  <polygon points="535,445 545,445 540,455" fill="#F4D03F" opacity="0.5"/>

  <!-- Step 2: Algorithm (center, wider) -->
  <g transform="translate(80, 460)">
    <rect width="920" height="160" rx="12" fill="url(#cardGrad)" stroke="#F4D03F" stroke-width="1.5" stroke-opacity="0.35"/>
    <!-- Step number -->
    <circle cx="45" cy="42" r="22" fill="#F4D03F" opacity="0.15"/>
    <text x="45" y="50" font-family="Oswald, sans-serif" font-weight="700" font-size="26" fill="#F4D03F" text-anchor="middle">2</text>
    <!-- Text -->
    <text x="80" y="50" font-family="Oswald, sans-serif" font-weight="600" font-size="26" fill="#FDFEFE" letter-spacing="1">13-LAYER RANKING ALGORITHM</text>
    <!-- Layer visualization -->
    <g transform="translate(25, 70)">
      <rect x="0" y="0" width="65" height="28" rx="4" fill="#F4D03F" opacity="0.15" stroke="#F4D03F" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="32" y="19" font-family="DM Sans, sans-serif" font-size="13" fill="#FDFEFE" text-anchor="middle" opacity="0.7">Offense</text>

      <rect x="75" y="0" width="70" height="28" rx="4" fill="#F4D03F" opacity="0.15" stroke="#F4D03F" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="110" y="19" font-family="DM Sans, sans-serif" font-size="13" fill="#FDFEFE" text-anchor="middle" opacity="0.7">Defense</text>

      <rect x="155" y="0" width="70" height="28" rx="4" fill="#F4D03F" opacity="0.15" stroke="#F4D03F" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="190" y="19" font-family="DM Sans, sans-serif" font-size="13" fill="#FDFEFE" text-anchor="middle" opacity="0.7">Recency</text>

      <rect x="235" y="0" width="45" height="28" rx="4" fill="#F4D03F" opacity="0.15" stroke="#F4D03F" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="257" y="19" font-family="DM Sans, sans-serif" font-size="13" fill="#FDFEFE" text-anchor="middle" opacity="0.7">SOS</text>

      <rect x="290" y="0" width="95" height="28" rx="4" fill="#F4D03F" opacity="0.15" stroke="#F4D03F" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="337" y="19" font-family="DM Sans, sans-serif" font-size="13" fill="#FDFEFE" text-anchor="middle" opacity="0.7">Bayesian</text>

      <rect x="395" y="0" width="85" height="28" rx="4" fill="#F4D03F" opacity="0.15" stroke="#F4D03F" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="437" y="19" font-family="DM Sans, sans-serif" font-size="13" fill="#FDFEFE" text-anchor="middle" opacity="0.7">Adaptive K</text>

      <rect x="490" y="0" width="120" height="28" rx="4" fill="#F4D03F" opacity="0.25" stroke="#F4D03F" stroke-width="1" stroke-opacity="0.5"/>
      <text x="550" y="19" font-family="DM Sans, sans-serif" font-size="13" fill="#F4D03F" text-anchor="middle" font-weight="600">ML Layer 13</text>

      <text x="630" y="19" font-family="DM Sans, sans-serif" font-size="14" fill="#FDFEFE" opacity="0.4">+ 6 more layers</text>
    </g>
    <text x="25" y="130" font-family="DM Sans, sans-serif" font-size="18" fill="#FDFEFE" opacity="0.65">Proprietary engine with machine learning — analyzes offense, defense, strength of schedule &amp; more</text>
  </g>

  <!-- Arrow connector -->
  <path d="M540,625 L540,650" stroke="#F4D03F" stroke-width="2" opacity="0.5"/>
  <polygon points="535,650 545,650 540,660" fill="#F4D03F" opacity="0.5"/>

  <!-- Step 3: PowerScore -->
  <g transform="translate(80, 665)">
    <rect width="420" height="155" rx="12" fill="url(#cardGrad)" stroke="#F4D03F" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="45" cy="40" r="22" fill="#F4D03F" opacity="0.15"/>
    <text x="45" y="48" font-family="Oswald, sans-serif" font-weight="700" font-size="26" fill="#F4D03F" text-anchor="middle">3</text>
    <!-- PowerScore visualization -->
    <g transform="translate(320, 15)">
      <rect x="0" y="0" width="80" height="65" rx="8" fill="#F4D03F" opacity="0.12"/>
      <text x="40" y="30" font-family="Oswald, sans-serif" font-weight="700" font-size="16" fill="#F4D03F" text-anchor="middle" letter-spacing="1">POWER</text>
      <text x="40" y="52" font-family="Oswald, sans-serif" font-weight="700" font-size="22" fill="#F4D03F" text-anchor="middle">0.94</text>
    </g>
    <text x="80" y="47" font-family="Oswald, sans-serif" font-weight="600" font-size="26" fill="#FDFEFE" letter-spacing="1">POWERSCORE OUTPUT</text>
    <text x="25" y="85" font-family="DM Sans, sans-serif" font-size="19" fill="#FDFEFE" opacity="0.7">Every team gets a 0.00–1.00 score</text>
    <text x="25" y="112" font-family="DM Sans, sans-serif" font-size="19" fill="#FDFEFE" opacity="0.7">reflecting true competitive strength</text>
    <text x="25" y="140" font-family="DM Sans, sans-serif" font-size="17" fill="#F4D03F" opacity="0.6">0.95+ = Elite National Level</text>
  </g>

  <!-- Step 4: Rankings Published -->
  <g transform="translate(580, 665)">
    <rect width="420" height="155" rx="12" fill="url(#cardGrad)" stroke="#F4D03F" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="45" cy="40" r="22" fill="#F4D03F" opacity="0.15"/>
    <text x="45" y="48" font-family="Oswald, sans-serif" font-weight="700" font-size="26" fill="#F4D03F" text-anchor="middle">4</text>
    <!-- Ranking list icon -->
    <g transform="translate(330, 20)">
      <rect x="0" y="0" width="60" height="14" rx="3" fill="#F4D03F" opacity="0.4"/>
      <rect x="0" y="20" width="50" height="14" rx="3" fill="#F4D03F" opacity="0.3"/>
      <rect x="0" y="40" width="40" height="14" rx="3" fill="#F4D03F" opacity="0.2"/>
    </g>
    <text x="80" y="47" font-family="Oswald, sans-serif" font-weight="600" font-size="26" fill="#FDFEFE" letter-spacing="1">RANKINGS PUBLISHED</text>
    <text x="25" y="85" font-family="DM Sans, sans-serif" font-size="19" fill="#FDFEFE" opacity="0.7">State and national rankings updated</text>
    <text x="25" y="112" font-family="DM Sans, sans-serif" font-size="19" fill="#FDFEFE" opacity="0.7">every Monday — free to browse</text>
    <text x="25" y="140" font-family="DM Sans, sans-serif" font-size="17" fill="#F4D03F" opacity="0.6">pitchrank.io/rankings</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="1010" width="1080" height="70" fill="#052E27" opacity="0.8"/>
  <rect x="0" y="1008" width="1080" height="3" fill="#F4D03F" opacity="0.6"/>
  <rect x="50" y="1025" width="8" height="35" fill="#F4D03F" transform="skewX(-12)"/>
  <text x="75" y="1055" font-family="Oswald, sans-serif" font-weight="700" font-size="30" fill="#FDFEFE" letter-spacing="2">PITCH<tspan fill="#F4D03F">RANK</tspan></text>
  <text x="1030" y="1055" font-family="DM Sans, sans-serif" font-weight="500" font-size="22" fill="#F4D03F" text-anchor="end" opacity="0.8">pitchrank.io</text>

  <!-- Bottom right diagonals -->
  <rect x="980" y="870" width="10" height="120" fill="#F4D03F" transform="skewX(-12)" opacity="0.6"/>
  <rect x="1000" y="885" width="5" height="80" fill="#F4D03F" transform="skewX(-12)" opacity="0.3"/>
</svg>
