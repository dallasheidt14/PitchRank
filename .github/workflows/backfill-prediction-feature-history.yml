name: Backfill Prediction Feature History

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Inclusive start date (YYYY-MM-DD)'
        required: true
        type: string
      end_date:
        description: 'Inclusive end date (YYYY-MM-DD)'
        required: true
        type: string
      cadence:
        description: 'Replay cadence'
        required: true
        default: weekly
        type: choice
        options:
          - weekly
          - daily
      weekday:
        description: 'Weekday for weekly cadence (Mon..Sun or 0..6)'
        required: false
        default: Mon
        type: string
      lookback_days:
        description: 'Ranking lookback window'
        required: false
        default: '365'
        type: string
      provider:
        description: 'Optional provider filter'
        required: false
        default: ''
        type: string
      engine:
        description: 'Ranking engine to use during replay'
        required: true
        default: glicko
        type: choice
        options:
          - glicko
          - v53e
      disable_ml:
        description: 'Disable Layer 13 during replay'
        required: false
        default: false
        type: boolean
      force_rebuild:
        description: 'Ignore cached cohort results'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Compute dates without writing snapshots'
        required: false
        default: true
        type: boolean
      chunk_index:
        description: 'Zero-based chunk index within the generated date list'
        required: false
        default: '0'
        type: string
      chunk_size:
        description: 'Snapshot dates to process in this run (defaults to 1)'
        required: false
        default: '1'
        type: string
      overwrite_existing:
        description: 'Replay dates even if rows already exist'
        required: false
        default: false
        type: boolean
      max_snapshots:
        description: 'Optional cap on processed snapshot dates'
        required: false
        default: ''
        type: string
      stop_on_error:
        description: 'Abort immediately on first failed date'
        required: false
        default: false
        type: boolean

concurrency:
  group: prediction-feature-history-backfill
  cancel-in-progress: false

jobs:
  backfill-prediction-feature-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Show commit hash
        run: |
          echo "Current commit:"
          git rev-parse HEAD

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          python -c "import supabase, pandas, numpy, rich; print('All critical imports successful')"

      - name: Run prediction feature backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PYTHONUNBUFFERED: "1"
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
          CADENCE: ${{ github.event.inputs.cadence }}
          WEEKDAY: ${{ github.event.inputs.weekday }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days }}
          PROVIDER: ${{ github.event.inputs.provider }}
          ENGINE: ${{ github.event.inputs.engine }}
          DISABLE_ML: ${{ github.event.inputs.disable_ml }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          CHUNK_INDEX_INPUT: ${{ github.event.inputs.chunk_index }}
          CHUNK_SIZE_INPUT: ${{ github.event.inputs.chunk_size }}
          OVERWRITE_EXISTING: ${{ github.event.inputs.overwrite_existing }}
          MAX_SNAPSHOTS: ${{ github.event.inputs.max_snapshots }}
          STOP_ON_ERROR: ${{ github.event.inputs.stop_on_error }}
        run: |
          export PYTHONPATH="${PYTHONPATH}:${PWD}"

          CHUNK_INDEX="$CHUNK_INDEX_INPUT"
          CHUNK_SIZE="$CHUNK_SIZE_INPUT"
          RUN_MAX_SNAPSHOTS="$MAX_SNAPSHOTS"
          if [ -z "$RUN_MAX_SNAPSHOTS" ] && [ -n "$CHUNK_SIZE" ]; then
            RUN_MAX_SNAPSHOTS="$CHUNK_SIZE"
          fi
          SKIP_SNAPSHOTS=$((CHUNK_INDEX * CHUNK_SIZE))

          echo "Chunk index: $CHUNK_INDEX"
          echo "Chunk size: $CHUNK_SIZE"
          echo "Skip snapshots: $SKIP_SNAPSHOTS"
          echo "Max snapshots this run: ${RUN_MAX_SNAPSHOTS:-unbounded}"

          CMD=(
            python scripts/backfill_prediction_feature_history.py
            --start-date "$START_DATE"
            --end-date "$END_DATE"
            --cadence "$CADENCE"
            --weekday "$WEEKDAY"
            --lookback-days "$LOOKBACK_DAYS"
            --engine "$ENGINE"
            --skip-snapshots "$SKIP_SNAPSHOTS"
          )

          if [ -n "$PROVIDER" ]; then
            CMD+=(--provider "$PROVIDER")
          fi

          if [ "$DISABLE_ML" = "true" ]; then
            CMD+=(--disable-ml)
          fi

          if [ "$FORCE_REBUILD" = "true" ]; then
            CMD+=(--force-rebuild)
          fi

          if [ "$DRY_RUN" = "true" ]; then
            CMD+=(--dry-run)
          fi

          if [ "$OVERWRITE_EXISTING" = "true" ]; then
            CMD+=(--overwrite-existing)
          fi

          if [ -n "$RUN_MAX_SNAPSHOTS" ]; then
            CMD+=(--max-snapshots "$RUN_MAX_SNAPSHOTS")
          fi

          if [ "$STOP_ON_ERROR" = "true" ]; then
            CMD+=(--stop-on-error)
          fi

          printf 'Running command:\n'
          printf ' %q' "${CMD[@]}"
          printf '\n'

          "${CMD[@]}"
