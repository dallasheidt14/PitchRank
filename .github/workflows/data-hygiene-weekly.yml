name: Weekly Data Hygiene

on:
  schedule:
    # Run every Tuesday at 10:00 AM MST (5:00 PM UTC)
    # MST (UTC-7): 10:00 AM = 17:00 UTC
    # MDT (UTC-6): 10:00 AM = 16:00 UTC  (will run at 11 AM MDT in summer)
    - cron: '0 17 * * 2'
  workflow_dispatch:
    inputs:
      gender:
        description: 'Gender to process'
        required: true
        default: 'male'
        type: choice
        options:
          - 'male'
          - 'female'
          - 'both'
      dry_run:
        description: 'Dry run (scan only, no writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      skip_steps:
        description: 'Comma-separated step numbers to skip (e.g., 1,2)'
        required: false
        default: ''
        type: string

# ─────────────────────────────────────────────────────────────
# Pipeline order (dependencies matter!):
#
#   1. full_club_analysis.py       — Standardize club name variants (SC vs Soccer Club, caps)
#   2. match_state_from_club.py    — Fill state_code from club (before Fuzzy groups by state)
#   3. normalize_team_names.py     — Ages (14B→2014, 15M→2015), strip gender words
#   4. fix_team_age_groups.py      — Fix age_group from birth year (before Fuzzy compares)
#   5. find_fuzzy_duplicate_teams  — Fuzzy-match & merge (needs state for grouping)
#   6. find_queue_matches.py       — Match review queue (fewer orphans after Fuzzy)
#
# Why this order:
#   • Match State before Fuzzy: more teams have state, so Fuzzy groups correctly (avoids false merges)
#   • Fix Age before Fuzzy: correct age before comparing duplicates
#   • Club before Normalize; Normalize before Fix Age
# ─────────────────────────────────────────────────────────────

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  # Keep key env vars aligned with other working workflows in this repo.
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  PYTHONUNBUFFERED: '1'

jobs:
  data-hygiene-pipeline:
    name: Full Data Hygiene Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ── Setup ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install supabase psycopg2-binary python-dotenv
          echo "✅ Dependencies installed"

      - name: Verify Supabase secrets
        run: |
          echo "SUPABASE_URL is set: $([ -n "$SUPABASE_URL" ] && echo yes || echo no)"
          echo "SUPABASE_KEY is set: $([ -n "$SUPABASE_KEY" ] && echo yes || echo no)"
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::error::Missing secrets. In repo Settings → Secrets and variables → Actions, add SUPABASE_URL and SUPABASE_SERVICE_KEY."
            exit 1
          fi

      - name: Create logs directory
        run: mkdir -p logs

      # ── Step 1: Club Name Standardization ─────────────────
      - name: 'Step 1: Club Name Standardization'
        id: step1
        if: ${{ !contains(format(',{0},', github.event.inputs.skip_steps || ''), ',1,') }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 1: CLUB NAME STANDARDIZATION"
          echo "═══════════════════════════════════════════════════"

          EXECUTE_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            EXECUTE_FLAG="--execute"
          else
            EXECUTE_FLAG="--dry-run"
          fi

          python scripts/full_club_analysis.py $EXECUTE_FLAG 2>&1 | tee logs/step1_club_standardize.log

          TOTAL_FIXES=$(grep -oP 'TOTAL: \K\d+' logs/step1_club_standardize.log || echo "0")
          TEAMS_AFFECTED=$(grep -oP '\s+(\d+) teams will' logs/step1_club_standardize.log | grep -oP '\d+' || echo "0")
          echo "naming_fixes=$TOTAL_FIXES" >> $GITHUB_OUTPUT
          echo "teams_standardized=$TEAMS_AFFECTED" >> $GITHUB_OUTPUT

      # ── Step 2: Match State Codes via Club Names ───────────
      - name: 'Step 2: Match State Codes via Club Names'
        id: step2
        if: ${{ !contains(format(',{0},', github.event.inputs.skip_steps || ''), ',2,') }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 2: MATCH STATE CODES VIA CLUB NAMES"
          echo "═══════════════════════════════════════════════════"

          STATE_FLAGS="--yes"
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            STATE_FLAGS="--dry-run"
          fi

          python scripts/match_state_from_club.py $STATE_FLAGS 2>&1 | tee logs/step2_match_state.log

          STATE_MATCHED=$(grep -oP 'Can be matched via club name: \K\d+' logs/step2_match_state.log || echo "0")
          echo "state_matched=$STATE_MATCHED" >> $GITHUB_OUTPUT

      # ── Step 3: Normalize Team Names ──────────────────────
      - name: 'Step 3: Normalize Team Names'
        id: step3
        if: ${{ !contains(format(',{0},', github.event.inputs.skip_steps || ''), ',3,') }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 3: NORMALIZE TEAM NAMES"
          echo "═══════════════════════════════════════════════════"

          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          python scripts/normalize_team_names.py --all-teams $DRY_RUN_FLAG 2>&1 | tee logs/step3_normalize_names.log

          NORMALIZED=$(grep -oP '(Would update|Updated): \K\d+' logs/step3_normalize_names.log || echo "0")
          echo "teams_normalized=$NORMALIZED" >> $GITHUB_OUTPUT

      # ── Step 4: Fix Age Year Discrepancies ─────────────────
      - name: 'Step 4: Fix Age Year Discrepancies'
        id: step4
        if: ${{ !contains(format(',{0},', github.event.inputs.skip_steps || ''), ',4,') }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 4: FIX AGE YEAR DISCREPANCIES"
          echo "═══════════════════════════════════════════════════"

          AGE_FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            AGE_FLAGS="--dry-run"
          fi

          python scripts/fix_team_age_groups.py $AGE_FLAGS 2>&1 | tee logs/step4_fix_age.log

          AGE_FIXED=$(grep -oP 'SUMMARY: Fixed \K\d+' logs/step4_fix_age.log || grep -oP 'Found \K\d+(?= teams with age)' logs/step4_fix_age.log || echo "0")
          echo "age_fixed=$AGE_FIXED" >> $GITHUB_OUTPUT

      # ── Step 5: Fuzzy Duplicate Merge ─────────────────────
      - name: 'Step 5: Fuzzy Duplicate Merge'
        id: step5
        if: ${{ !contains(format(',{0},', github.event.inputs.skip_steps || ''), ',5,') }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 5: FUZZY DUPLICATE MERGE"
          echo "═══════════════════════════════════════════════════"

          # Determine which genders to run (scheduled runs default to male)
          GENDER_INPUT="${{ github.event.inputs.gender || 'male' }}"
          if [ "$GENDER_INPUT" == "both" ]; then
            GENDERS="male female"
          else
            GENDERS="$GENDER_INPUT"
          fi

          TOTAL_MERGED=0
          TOTAL_SUGGESTED=0

          for GENDER in $GENDERS; do
            # U18 is merged into the U19 cohort for duplicate-review workflows.
            for AGE in u10 u11 u12 u13 u14 u15 u16 u17 u19; do
              echo ""
              echo "── $AGE $GENDER ──"

              if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
                python scripts/find_fuzzy_duplicate_teams.py \
                  --age-group "$AGE" --gender "$GENDER" --dry-run --min-score 0.90 \
                  2>&1 | tee -a logs/step5_fuzzy_merge.log
              else
                python scripts/find_fuzzy_duplicate_teams.py \
                  --age-group "$AGE" --gender "$GENDER" --auto-merge --min-score 0.90 \
                  2>&1 | tee -a logs/step5_fuzzy_merge.log
              fi

              # Accumulate counts
              SUGGESTED=$(grep -oP 'Suggested merges.*?: \K\d+' logs/step5_fuzzy_merge.log | tail -1 || echo "0")
              MERGED_NOW=$(grep -oP 'Done: \K\d+' logs/step5_fuzzy_merge.log | tail -1 || echo "0")
              TOTAL_SUGGESTED=$((TOTAL_SUGGESTED + SUGGESTED))
              TOTAL_MERGED=$((TOTAL_MERGED + MERGED_NOW))
            done
          done

          echo "fuzzy_suggested=$TOTAL_SUGGESTED" >> $GITHUB_OUTPUT
          echo "fuzzy_merged=$TOTAL_MERGED" >> $GITHUB_OUTPUT

      # ── Step 6: Match Review Queue ────────────────────────
      - name: 'Step 6: Match Review Queue'
        id: step6
        if: ${{ !contains(format(',{0},', github.event.inputs.skip_steps || ''), ',6,') }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 6: MATCH REVIEW QUEUE"
          echo "═══════════════════════════════════════════════════"

          EXECUTE_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            EXECUTE_FLAG="--execute --yes"
          fi

          python scripts/find_queue_matches.py --force $EXECUTE_FLAG 2>&1 | tee logs/step6_queue_matches.log

          EXACT=$(grep -oP 'EXACT \(95%\+\):\s+\K\d+' logs/step6_queue_matches.log || echo "0")
          QUEUE_MERGED=$(grep -oP 'Approved: \K\d+' logs/step6_queue_matches.log || echo "0")
          echo "exact_matches=$EXACT" >> $GITHUB_OUTPUT
          echo "queue_merged=$QUEUE_MERGED" >> $GITHUB_OUTPUT

      # ── Artifacts ─────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: hygiene-logs-${{ github.run_number }}
          path: |
            logs/step*.log
            scripts/club_name_fixes_male_all_states.sql
          retention-days: 30

      # ── Summary ───────────────────────────────────────────
      - name: Pipeline Summary
        if: always()
        run: |
          MODE="${{ github.event.inputs.dry_run == 'true' && '🔍 Dry Run' || '⚡ Live' }}"

          echo "## 🧹 Weekly Data Hygiene Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          GENDER="${{ github.event.inputs.gender || 'male' }}"
          echo "**Mode:** $MODE | **Gender:** $GENDER" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Task | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Club Name Standardization | ${{ steps.step1.outputs.naming_fixes || 'skipped' }} fixes (${{ steps.step1.outputs.teams_standardized || '0' }} teams) |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Match State Codes | ${{ steps.step2.outputs.state_matched || 'skipped' }} matched |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | Normalize Team Names | ${{ steps.step3.outputs.teams_normalized || 'skipped' }} normalized |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | Fix Age Year | ${{ steps.step4.outputs.age_fixed || 'skipped' }} fixed |" >> $GITHUB_STEP_SUMMARY
          echo "| 5 | Fuzzy Duplicate Merge | ${{ steps.step5.outputs.fuzzy_suggested || 'skipped' }} suggested, ${{ steps.step5.outputs.fuzzy_merged || '0' }} merged |" >> $GITHUB_STEP_SUMMARY
          echo "| 6 | Match Review Queue | ${{ steps.step6.outputs.exact_matches || 'skipped' }} exact, ${{ steps.step6.outputs.queue_merged || '0' }} merged |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Order" >> $GITHUB_STEP_SUMMARY
          echo "1. Club → 2. Match state → 3. Normalize → 4. Fix age → 5. Fuzzy merge → 6. Queue" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Safety Notes" >> $GITHUB_STEP_SUMMARY
          echo "- Fuzzy merge only merges teams with same club_name and 90%+ similarity" >> $GITHUB_STEP_SUMMARY
          echo "- Distinction-aware: colors, programs, numbers, regions all must match" >> $GITHUB_STEP_SUMMARY
          echo "- Queue only auto-merges 95%+ confidence matches" >> $GITHUB_STEP_SUMMARY
          echo "- All scripts use \`team_name_normalizer.py\` core parsing logic" >> $GITHUB_STEP_SUMMARY
