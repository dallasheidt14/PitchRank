name: Weekly Data Hygiene

on:
  schedule:
    # Run every Monday at 5:00 AM Mountain Time (11:00 UTC MDT / 12:00 UTC MST).
    # Anchored to MDT — runs at 4 AM MST in winter.
    - cron: '0 11 * * 1'
  workflow_dispatch:
    inputs:
      gender:
        description: 'Gender to process'
        required: true
        default: 'male'
        type: choice
        options:
          - 'male'
          - 'female'
          - 'both'
      dry_run:
        description: 'Dry run (scan only, no writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      skip_steps:
        description: 'Comma-separated step numbers to skip (e.g., 1,2)'
        required: false
        default: ''
        type: string

# ─────────────────────────────────────────────────────────────
# Pipeline order (dependencies matter!):
#
#   1.  normalize_team_names.py     — Ages (14B→2014, 15M→2015), strip gender words
#   1b. backfill_team_distinction.py — Populate distinction column from team_name
#   2.  fix_team_age_groups.py      — Fix age_group from birth year (before Fuzzy compares)
#   3.  find_fuzzy_duplicate_teams  — Fuzzy-match & merge (needs state for grouping)
#   4.  find_queue_matches.py       — Match review queue (fewer orphans after Fuzzy)
#
# Club name standardization + state_code matching now run upstream of this
# pipeline in `update-missing-club-and-state.yml` (Mondays). They used to
# live here as Steps 1-2; both are removed since the Monday workflow already
# guarantees clean club_name + state_code by the time this Tuesday pass runs.
#
# Why this order:
#   • Fix Age before Fuzzy: correct age before comparing duplicates
#   • Normalize before Fix Age: clean tokens first
#   • Distinction (1b) after Normalize because it reads canonical team_name;
#     placed before Fix Age because age_group changes are rare relative to
#     team_name tokenization.
# ─────────────────────────────────────────────────────────────

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  # Keep key env vars aligned with other working workflows in this repo.
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  PYTHONUNBUFFERED: '1'

jobs:
  data-hygiene-pipeline:
    name: Full Data Hygiene Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ── Setup ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install supabase psycopg2-binary python-dotenv
          echo "✅ Dependencies installed"

      - name: Verify Supabase secrets
        run: |
          echo "SUPABASE_URL is set: $([ -n "$SUPABASE_URL" ] && echo yes || echo no)"
          echo "SUPABASE_KEY is set: $([ -n "$SUPABASE_KEY" ] && echo yes || echo no)"
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::error::Missing secrets. In repo Settings → Secrets and variables → Actions, add SUPABASE_URL and SUPABASE_SERVICE_KEY."
            exit 1
          fi

      - name: Create logs directory
        run: mkdir -p logs

      # ── Step 1: Normalize Team Names ──────────────────────
      - name: 'Step 1: Normalize Team Names'
        id: step1
        if: ${{ !contains(format(',{0},', github.event.inputs.skip_steps || ''), ',1,') }}
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 1: NORMALIZE TEAM NAMES"
          echo "═══════════════════════════════════════════════════"

          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          python scripts/normalize_team_names.py --all-teams $DRY_RUN_FLAG 2>&1 | tee logs/step1_normalize_names.log

          NORMALIZED=$(grep -oP '(Would update|Updated): \K\d+' logs/step1_normalize_names.log || echo "0")
          echo "teams_normalized=$NORMALIZED" >> $GITHUB_OUTPUT

      # ── Step 1b: Backfill Team Distinction ────────────────
      - name: 'Step 1b: Backfill Team Distinction'
        id: step1b
        if: ${{ !contains(format(',{0},', github.event.inputs.skip_steps || ''), ',1b,') }}
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 1b: BACKFILL TEAM DISTINCTION"
          echo "═══════════════════════════════════════════════════"

          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          python scripts/backfill_team_distinction.py $DRY_RUN_FLAG 2>&1 | tee logs/step1b_distinction.log

          DISTINCTION_UPDATED=$(grep -oP '(Would update|Updated): \K\d+' logs/step1b_distinction.log | tail -1 || echo "0")
          echo "distinction_updated=$DISTINCTION_UPDATED" >> $GITHUB_OUTPUT

      # ── Step 2: Fix Age Year Discrepancies ─────────────────
      - name: 'Step 2: Fix Age Year Discrepancies'
        id: step2
        if: ${{ !contains(format(',{0},', github.event.inputs.skip_steps || ''), ',2,') }}
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 2: FIX AGE YEAR DISCREPANCIES"
          echo "═══════════════════════════════════════════════════"

          AGE_FLAGS=""
          if [ "$DRY_RUN" == "true" ]; then
            AGE_FLAGS="--dry-run"
          fi

          python scripts/fix_team_age_groups.py $AGE_FLAGS 2>&1 | tee logs/step2_fix_age.log

          AGE_FIXED=$(grep -oP 'SUMMARY: Fixed \K\d+' logs/step2_fix_age.log || grep -oP 'Found \K\d+(?= teams with age)' logs/step2_fix_age.log || echo "0")
          echo "age_fixed=$AGE_FIXED" >> $GITHUB_OUTPUT

      # ── Step 3: Fuzzy Duplicate Merge ─────────────────────
      - name: 'Step 3: Fuzzy Duplicate Merge'
        id: step3
        if: ${{ !contains(format(',{0},', github.event.inputs.skip_steps || ''), ',3,') }}
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          GENDER_RAW: ${{ github.event.inputs.gender }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 5: FUZZY DUPLICATE MERGE"
          echo "═══════════════════════════════════════════════════"

          # Determine which genders to run (scheduled runs default to male)
          GENDER_INPUT="${GENDER_RAW:-male}"
          if [ "$GENDER_INPUT" == "both" ]; then
            GENDERS="male female"
          else
            GENDERS="$GENDER_INPUT"
          fi

          TOTAL_MERGED=0
          TOTAL_SUGGESTED=0

          for GENDER in $GENDERS; do
            # U18 is merged into the U19 cohort for duplicate-review workflows.
            for AGE in u10 u11 u12 u13 u14 u15 u16 u17 u19; do
              echo ""
              echo "── $AGE $GENDER ──"

              if [ "$DRY_RUN" == "true" ]; then
                python scripts/find_fuzzy_duplicate_teams.py \
                  --age-group "$AGE" --gender "$GENDER" --dry-run --min-score 0.90 \
                  2>&1 | tee -a logs/step3_fuzzy_merge.log
              else
                python scripts/find_fuzzy_duplicate_teams.py \
                  --age-group "$AGE" --gender "$GENDER" --auto-merge --min-score 0.90 \
                  2>&1 | tee -a logs/step3_fuzzy_merge.log
              fi

              # Accumulate counts
              SUGGESTED=$(grep -oP 'Suggested merges.*?: \K\d+' logs/step3_fuzzy_merge.log | tail -1 || echo "0")
              MERGED_NOW=$(grep -oP 'Done: \K\d+' logs/step3_fuzzy_merge.log | tail -1 || echo "0")
              TOTAL_SUGGESTED=$((TOTAL_SUGGESTED + SUGGESTED))
              TOTAL_MERGED=$((TOTAL_MERGED + MERGED_NOW))
            done
          done

          echo "fuzzy_suggested=$TOTAL_SUGGESTED" >> $GITHUB_OUTPUT
          echo "fuzzy_merged=$TOTAL_MERGED" >> $GITHUB_OUTPUT

      # ── Step 4: Match Review Queue ────────────────────────
      - name: 'Step 4: Match Review Queue'
        id: step4
        if: ${{ !contains(format(',{0},', github.event.inputs.skip_steps || ''), ',4,') }}
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 4: MATCH REVIEW QUEUE"
          echo "═══════════════════════════════════════════════════"

          EXECUTE_FLAG=""
          if [ "$DRY_RUN" != "true" ]; then
            EXECUTE_FLAG="--execute --yes"
          fi

          python scripts/find_queue_matches.py --limit 0 --force $EXECUTE_FLAG 2>&1 | tee logs/step4_queue_matches.log

          EXACT=$(grep -oP 'EXACT \(95%\+\):\s+\K\d+' logs/step4_queue_matches.log || echo "0")
          QUEUE_MERGED=$(grep -oP 'Approved: \K\d+' logs/step4_queue_matches.log || echo "0")
          echo "exact_matches=$EXACT" >> $GITHUB_OUTPUT
          echo "queue_merged=$QUEUE_MERGED" >> $GITHUB_OUTPUT

      # ── Artifacts ─────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: hygiene-logs-${{ github.run_number }}
          path: |
            logs/step*.log
          retention-days: 30

      # ── Summary ───────────────────────────────────────────
      - name: Pipeline Summary
        if: always()
        env:
          MODE: ${{ github.event.inputs.dry_run == 'true' && '🔍 Dry Run' || '⚡ Live' }}
          GENDER_RAW: ${{ github.event.inputs.gender }}
          STEP1_TEAMS_NORMALIZED: ${{ steps.step1.outputs.teams_normalized || 'skipped' }}
          STEP1B_DISTINCTION_UPDATED: ${{ steps.step1b.outputs.distinction_updated || 'skipped' }}
          STEP2_AGE_FIXED: ${{ steps.step2.outputs.age_fixed || 'skipped' }}
          STEP3_FUZZY_SUGGESTED: ${{ steps.step3.outputs.fuzzy_suggested || 'skipped' }}
          STEP3_FUZZY_MERGED: ${{ steps.step3.outputs.fuzzy_merged || '0' }}
          STEP4_EXACT_MATCHES: ${{ steps.step4.outputs.exact_matches || 'skipped' }}
          STEP4_QUEUE_MERGED: ${{ steps.step4.outputs.queue_merged || '0' }}
        run: |
          echo "## 🧹 Weekly Data Hygiene Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          GENDER="${GENDER_RAW:-male}"
          echo "**Mode:** $MODE | **Gender:** $GENDER" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Task | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Normalize Team Names | $STEP1_TEAMS_NORMALIZED normalized |" >> $GITHUB_STEP_SUMMARY
          echo "| 1b | Backfill Distinction | $STEP1B_DISTINCTION_UPDATED updated |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Fix Age Year | $STEP2_AGE_FIXED fixed |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | Fuzzy Duplicate Merge | $STEP3_FUZZY_SUGGESTED suggested, $STEP3_FUZZY_MERGED merged |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | Match Review Queue | $STEP4_EXACT_MATCHES exact, $STEP4_QUEUE_MERGED merged |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Order" >> $GITHUB_STEP_SUMMARY
          echo "1. Normalize → 1b. Distinction → 2. Fix age → 3. Fuzzy merge → 4. Queue" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Club name standardization + state_code matching run upstream in \`update-missing-club-and-state.yml\` (Mondays)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Safety Notes" >> $GITHUB_STEP_SUMMARY
          echo "- Fuzzy merge only merges teams with same club_name and 90%+ similarity" >> $GITHUB_STEP_SUMMARY
          echo "- Distinction-aware: colors, programs, numbers, regions all must match" >> $GITHUB_STEP_SUMMARY
          echo "- Queue only auto-merges 95%+ confidence matches" >> $GITHUB_STEP_SUMMARY
          echo "- All scripts use \`team_name_normalizer.py\` core parsing logic" >> $GITHUB_STEP_SUMMARY
