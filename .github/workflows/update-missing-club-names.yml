name: Update Missing Club Names

on:
  schedule:
    # Weekly on Monday at 10am Pacific (17:00 UTC PDT / 18:00 UTC PST)
    - cron: '0 17 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no DB writes)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      limit:
        description: "Max teams to process (blank = all)"
        required: false
        default: ""
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  PYTHONUNBUFFERED: "1"

jobs:
  update-club-names:
    name: Update Missing Club Names
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install supabase python-dotenv requests

      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_SERVICE_KEY secret."
            exit 1
          fi

      - name: "Step 1: Backfill from GotSport"
        run: |
          LIMIT_FLAG=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            LIMIT_FLAG="--limit ${{ github.event.inputs.limit }}"
          fi
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          python scripts/backfill_missing_club_names.py --workers 10 $DRY_FLAG $LIMIT_FLAG

      - name: "Step 2: Extract conservative in-state club matches"
        run: |
          LIMIT_FLAG=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            LIMIT_FLAG="--limit ${{ github.event.inputs.limit }}"
          fi
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          python scripts/extract_missing_club_names.py $DRY_FLAG $LIMIT_FLAG

      - name: "Step 3: Match missing state codes"
        run: |
          LIMIT_FLAG=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            LIMIT_FLAG="--limit ${{ github.event.inputs.limit }}"
          fi
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          python scripts/match_missing_state_codes.py $DRY_FLAG $LIMIT_FLAG

      - name: Workflow summary
        if: always()
        run: |
          echo "## Update Missing Club Names" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Runs every Monday at 10am Pacific." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Backfills missing club names from the GotSport API when a GotSport team ID exists." >> "$GITHUB_STEP_SUMMARY"
          echo "2. Then conservatively extracts club names from team_name, but only applies safe-only in-state matches and skips riskier branch/program/acronym cases." >> "$GITHUB_STEP_SUMMARY"
          echo "3. Then fills missing state codes only from safe single-state club matches, skipping acronym, extracted, and normalized/parens-based riskier cases." >> "$GITHUB_STEP_SUMMARY"
