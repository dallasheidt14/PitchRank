name: Enrich Instagram Handles

# Manual dispatch only — no automatic schedule.
# Run targeted sweeps first (--min-power-score, --state) before a full pass.
#
# Recommended first runs:
#   1. dry_run=true, limit=50              → validate scoring output
#   2. dry_run=false, min_power_score=0.80 → enrich top ~500 ranked teams
#   3. dry_run=false, min_power_score=0.60 → broader sweep ~2,000 teams
#   4. dry_run=false (no filter)           → full 25K team sweep (~375K queries)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no DB writes) — always start here"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      limit:
        description: "Max teams to process (blank = all eligible)"
        required: false
        default: ""
        type: string
      min_power_score:
        description: "Min power_score_final filter (0.0 = all teams, 0.70 = top ranked only)"
        required: false
        default: "0.70"
        type: string
      state:
        description: "Filter to a single state code (e.g. TX, CA — blank = all states)"
        required: false
        default: ""
        type: string
      age_group:
        description: "Filter to a single age group (e.g. u14 — blank = all)"
        required: false
        default: ""
        type: string
      gender:
        description: "Filter by gender (Male / Female — blank = both)"
        required: false
        default: ""
        type: string
      re_check:
        description: "Re-check teams that already have needs_review results"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      workers:
        description: "Concurrent workers (default: 3 — keep low for Serper rate limits)"
        required: false
        default: "3"
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
  PYTHONUNBUFFERED: "1"

jobs:
  enrich-instagram:
    name: Enrich Instagram Handles
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install supabase python-dotenv requests

      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_SERVICE_KEY secret."
            exit 1
          fi
          if [ -z "$SERPER_API_KEY" ]; then
            echo "::error::Missing SERPER_API_KEY secret. Add it at Settings > Secrets > Actions."
            exit 1
          fi

      - name: Build CLI flags
        id: flags
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          LIMIT: ${{ github.event.inputs.limit }}
          MIN_POWER_SCORE: ${{ github.event.inputs.min_power_score }}
          STATE: ${{ github.event.inputs.state }}
          AGE_GROUP: ${{ github.event.inputs.age_group }}
          GENDER: ${{ github.event.inputs.gender }}
          RE_CHECK: ${{ github.event.inputs.re_check }}
          WORKERS: ${{ github.event.inputs.workers }}
        run: |
          FLAGS=""

          if [ "$DRY_RUN" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi

          if [ -n "$LIMIT" ]; then
            FLAGS="$FLAGS --limit $LIMIT"
          fi

          if [ -n "$MIN_POWER_SCORE" ] && [ "$MIN_POWER_SCORE" != "0" ]; then
            FLAGS="$FLAGS --min-power-score $MIN_POWER_SCORE"
          fi

          if [ -n "$STATE" ]; then
            FLAGS="$FLAGS --state $STATE"
          fi

          if [ -n "$AGE_GROUP" ]; then
            FLAGS="$FLAGS --age-group $AGE_GROUP"
          fi

          if [ -n "$GENDER" ]; then
            FLAGS="$FLAGS --gender $GENDER"
          fi

          if [ "$RE_CHECK" = "true" ]; then
            FLAGS="$FLAGS --re-check"
          fi

          FLAGS="$FLAGS --workers ${WORKERS:-3}"

          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
          echo "Built flags: $FLAGS"

      - name: Enrich Instagram handles
        env:
          FLAGS: ${{ steps.flags.outputs.flags }}
        run: |
          python scripts/enrich_instagram_handles.py $FLAGS

      - name: Workflow summary
        if: always()
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          LIMIT: ${{ github.event.inputs.limit }}
          MIN_POWER_SCORE: ${{ github.event.inputs.min_power_score }}
          STATE: ${{ github.event.inputs.state }}
          AGE_GROUP: ${{ github.event.inputs.age_group }}
          GENDER: ${{ github.event.inputs.gender }}
        run: |
          echo "## Enrich Instagram Handles" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$DRY_RUN" = "true" ]; then MODE="DRY-RUN"; else MODE="LIVE"; fi
          echo "**Mode:** $MODE" >> "$GITHUB_STEP_SUMMARY"
          echo "**Filters:** limit=${LIMIT:-all} | power_score>=${MIN_POWER_SCORE:-0} | state=${STATE:-all} | age=${AGE_GROUP:-all} | gender=${GENDER:-all}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Results stored in \`team_social_profiles\` table." >> "$GITHUB_STEP_SUMMARY"
          echo "Review queue: \`team_instagram_review_queue\` view." >> "$GITHUB_STEP_SUMMARY"
