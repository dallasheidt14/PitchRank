name: Scrape Games
# Manual-only operator tool for bulk ZenRows-backed scraping (bootstrap,
# large one-offs, recovery from queue backlog). The Sunday-night automated
# chain was removed as part of the schedule-driven-scraping migration —
# ongoing scraping is now handled by the priority queue:
#   - enqueue_yesterday_games.py    (daily, priority 2)
#   - enqueue_discovery_teams.py    (weekly, priority 3)
#   - enqueue_safety_net.py         (weekly, priority 4)
# All three feed scrape_requests, drained by process_missing_games at
# 200 teams every 15 minutes.
#
# This workflow remains as a manual escape hatch for cases the queue can't
# handle in reasonable time (initial bootstrap, recovery, large one-off
# imports). Dispatch with limit_teams≥5000 or chain_remaining>0 to engage
# the 5-shard chain mode.
#
# Chain semantics (post-cron-removal): chain_remaining=N means "this run
# plus N dispatched follow-ups." For the full 6-link sweep (150K teams,
# enough to cover the ~137K gotsport pool) set chain_remaining=6. For a
# shorter sweep, use any N from 1-5.
run-name: >-
  Scrape Games · ${{
    (inputs.chain_remaining != '' && inputs.chain_remaining != '0' && format('25000 (chain, {0} remaining)', inputs.chain_remaining)) ||
    (inputs.limit_teams != '' && format('{0} teams', inputs.limit_teams)) ||
    (inputs.null_teams_only == true && 'NULL bootstrap') ||
    (inputs.include_recent == true && 'include recent') ||
    'incremental'
  }}

on:
  workflow_dispatch:
    inputs:
      limit_teams:
        description: 'Number of teams to scrape (prioritizes never-scraped, then oldest). Leave empty for incremental mode (7-day stale only).'
        required: false
        type: string
        default: ''
      null_teams_only:
        description: 'Only scrape teams with NULL last_scraped_at (bootstrap mode)'
        required: false
        type: boolean
        default: false
      since_date:
        description: 'Override since_date (YYYY-MM-DD format, for NULL teams)'
        required: false
        type: string
        default: ''
      concurrency:
        description: 'Number of concurrent scrapes (manual override; default is computed adaptively per shard)'
        required: false
        type: string
        default: '30'
      batch_size:
        description: 'Batch size for import (optimal: 1000-2000)'
        required: false
        type: string
        default: '1000'
      delay_min:
        description: 'Per-team min delay seconds (sleeps AFTER each team; empty = scraper default 1.5)'
        required: false
        type: string
        default: ''
      delay_max:
        description: 'Per-team max delay seconds (sleeps AFTER each team; empty = scraper default 2.5)'
        required: false
        type: string
        default: ''
      use_zenrows:
        description: 'Route gotsport API calls through ZenRows residential proxy (bypasses per-IP WAF budget; costs per request)'
        required: false
        type: boolean
        default: false
      zenrows_premium_proxy:
        description: 'When use_zenrows=true: use residential IPs (counted as "protected" / 25x cost). Disable to test datacenter IPs (counted as "standard"). Ignored when use_zenrows=false.'
        required: false
        type: boolean
        default: true
      include_recent:
        description: 'Include teams scraped within last 7 days (override default filter)'
        required: false
        type: boolean
        default: false
      chain_remaining:
        description: 'Total links in this chain INCLUDING this run. Set to 6 for a full 25K×6=150K sweep of the ~137K pool. Decrements by 1 each link until 0 (terminator).'
        required: false
        type: string
        default: '0'

# Workflow-level concurrency: serialize SEPARATE workflow RUNS. Each chain link
# is a separate run; the concurrency group queues them strictly serially so
# link N+1 waits for link N to fully exit before it starts. Without this, two
# links would write to `games` and `team_alias_map` simultaneously, causing
# duplicate inserts and stale alias-cache reads.
#
# DO NOT add a job-level `concurrency:` key inside `scrape-and-import` — doing so
# would serialize the 5 matrix shards and kill the parallel-speedup the plan
# relies on.
concurrency:
  group: game-scraping
  cancel-in-progress: false  # Queue subsequent chain links; do not cancel

jobs:
  prepare:
    runs-on: ubuntu-latest
    # Hard ceiling. Sized to accommodate the maintain step's 25-min worst case
    # plus ~5 min of checkout/install/gate overhead.
    timeout-minutes: 30
    outputs:
      should_shard: ${{ steps.gate.outputs.should_shard }}
      shard_count:  ${{ steps.gate.outputs.shard_count }}
      # JSON array of shard indices to actually run. [0] for small runs, [0..4]
      # when sharding. The scrape-and-import matrix consumes this via fromJSON(),
      # so only the shards we want get matrix-instantiated. This replaces an
      # earlier job-level `if: matrix.shard == 0 || ...` gate, which GitHub
      # rejected at parse time because `matrix` context isn't available at the
      # job level.
      shards:       ${{ steps.gate.outputs.shards }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          mkdir -p logs data/raw data/cache

      - name: Compute shard gate
        id: gate
        # User-controlled workflow_dispatch inputs flow via env: vars (never
        # interpolated directly into the shell body) so the shell, not the
        # GitHub Actions parser, handles quoting. Regex validates the value
        # before any numeric comparison.
        env:
          LIMIT_TEAMS: ${{ inputs.limit_teams }}
          CHAIN_REMAINING: ${{ inputs.chain_remaining }}
        run: |
          # In-flight chain link (chain_remaining > 0) and large manual runs
          # shard into 5. Small manual runs collapse to single-shard so the
          # RPC's hash filter is a no-op.
          if [[ "$CHAIN_REMAINING" =~ ^[1-9][0-9]*$ ]]; then
            echo "should_shard=true"        >> "$GITHUB_OUTPUT"
            echo "shard_count=5"            >> "$GITHUB_OUTPUT"
            echo "shards=[0,1,2,3,4]"       >> "$GITHUB_OUTPUT"
          elif [[ "$LIMIT_TEAMS" =~ ^[0-9]+$ ]] && [ "$LIMIT_TEAMS" -ge 5000 ]; then
            echo "should_shard=true"        >> "$GITHUB_OUTPUT"
            echo "shard_count=5"            >> "$GITHUB_OUTPUT"
            echo "shards=[0,1,2,3,4]"       >> "$GITHUB_OUTPUT"
          else
            # Small or no-arg manual run: only shard 0 executes. The RPC's hash
            # filter collapses to a no-op when p_shard_count <= 1.
            echo "should_shard=false"       >> "$GITHUB_OUTPUT"
            echo "shard_count=1"            >> "$GITHUB_OUTPUT"
            echo "shards=[0]"               >> "$GITHUB_OUTPUT"
          fi

      - name: Maintain GotSport direct ID aliases
        # Best-effort Tier 1 import-matching optimization; NOT a scraping
        # correctness requirement. continue-on-error prevents a transient
        # Supabase blip from cascading through `needs: prepare` and skipping
        # all 5 scrape shards.
        #
        # Step-level timeout-minutes (25) prevents the whole prepare JOB from
        # being cancelled when the per-row UPDATE loop hits its worst case
        # (~5K aliases × ~300ms ≈ 25 min). The job-level timeout is 30 min.
        # The checkout/install/gate steps above MUST NOT use continue-on-error
        # — they produce outputs every downstream shard depends on.
        continue-on-error: true
        timeout-minutes: 25
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/maintain_gotsport_direct_id_aliases.py

  scrape-and-import:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Reduced from 360. Each shard does ~1/5 the work.
    strategy:
      fail-fast: false
      # Dynamic matrix: the prepare job emits `shards` as a JSON array. Small
      # runs get [0] (single-shard, hash filter no-op); scheduled / >=5000-team
      # manual runs get [0,1,2,3,4]. The earlier approach (fixed [0..4] matrix
      # + job-level `if: matrix.shard == 0 || ...`) is invalid GHA syntax:
      # `matrix` context is not available at job-level `if:`.
      matrix:
        shard: ${{ fromJSON(needs.prepare.outputs.shards) }}
    # Job-level env: consistent for all steps. DO NOT put SCRAPE_SHARD_COUNT on
    # any step-level env block — step-level env overrides job-level env, which
    # would silently freeze SCRAPE_SHARD_COUNT to a stale literal.
    env:
      SCRAPE_SHARD_INDEX: ${{ matrix.shard }}
      SCRAPE_SHARD_COUNT: ${{ needs.prepare.outputs.shard_count }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          mkdir -p logs data/raw data/cache

      - name: Build scrape command
        id: build-command
        # Reads SCRAPE_SHARD_COUNT from job env (= needs.prepare.outputs.shard_count).
        # Computes per-shard --limit-teams and adaptive --concurrency.
        #
        # User-controlled workflow_dispatch inputs are passed via env: vars
        # (never interpolated directly into the shell body) so the shell
        # handles quoting. Numeric inputs are regex-validated before any
        # arithmetic / comparison.
        #
        # Per-shard integer division may lose 1–4 teams when inputs.limit_teams
        # is not divisible by 5 (e.g. 5001/5=1000 → total 5000). Acceptable at
        # scraping scale.
        env:
          LIMIT_TEAMS:       ${{ inputs.limit_teams }}
          NULL_TEAMS_ONLY:   ${{ inputs.null_teams_only }}
          SINCE_DATE:        ${{ inputs.since_date }}
          INCLUDE_RECENT:    ${{ inputs.include_recent }}
          CHAIN_REMAINING:   ${{ inputs.chain_remaining }}
          CONCURRENCY_INPUT: ${{ inputs.concurrency }}
          DELAY_MIN_INPUT:   ${{ inputs.delay_min }}
          DELAY_MAX_INPUT:   ${{ inputs.delay_max }}
        run: |
          CMD="python scripts/scrape_games.py --provider gotsport --auto-import"

          # Propagate validated delay overrides to the scraper via env. Regex
          # gates non-numeric input from reaching float() inside the scraper.
          # Both must be set together — a partial override (e.g. min only) would
          # leave the other at the scraper default and produce an unintended
          # range from random.uniform(min, max). Empty / invalid / mismatched
          # → fall through to GotSportScraper defaults (1.5 / 2.5).
          DELAY_MIN_OK="false"
          DELAY_MAX_OK="false"
          [[ "$DELAY_MIN_INPUT" =~ ^[0-9]+(\.[0-9]+)?$ ]] && DELAY_MIN_OK="true"
          [[ "$DELAY_MAX_INPUT" =~ ^[0-9]+(\.[0-9]+)?$ ]] && DELAY_MAX_OK="true"
          if [ "$DELAY_MIN_OK" = "true" ] && [ "$DELAY_MAX_OK" = "true" ]; then
            # awk handles float comparison ( [ ] / [[ ]] -lt is integer-only ).
            if awk -v a="$DELAY_MIN_INPUT" -v b="$DELAY_MAX_INPUT" 'BEGIN { exit !(a <= b) }'; then
              echo "GOTSPORT_DELAY_MIN=$DELAY_MIN_INPUT" >> "$GITHUB_ENV"
              echo "GOTSPORT_DELAY_MAX=$DELAY_MAX_INPUT" >> "$GITHUB_ENV"
            else
              echo "::warning::delay_min ($DELAY_MIN_INPUT) > delay_max ($DELAY_MAX_INPUT); ignoring overrides"
            fi
          elif [ "$DELAY_MIN_OK" = "true" ] || [ "$DELAY_MAX_OK" = "true" ]; then
            echo "::warning::delay_min and delay_max must be set together; ignoring partial override"
          fi

          # A chain link is a workflow_dispatch with chain_remaining > 0.
          # Chain links scrape 25000 teams (5000 per shard × 5 shards).
          # The Sunday-night cron seed was removed; chains are now started
          # manually by dispatching with chain_remaining=6 (for the documented
          # 6-link / 150K-team sweep). Each subsequent link inherits a
          # decremented value, runs as a full 5-shard 25K-team chain link, and
          # dispatches the next until chain_remaining reaches 0 (terminator).
          IS_CHAIN_LINK="false"
          if [[ "$CHAIN_REMAINING" =~ ^[1-9][0-9]*$ ]]; then
            IS_CHAIN_LINK="true"
          fi

          LIMIT_FLAG=""
          if [ "$IS_CHAIN_LINK" = "true" ]; then
            # Chain link (seed or follow-up): 25000 teams total / 5 shards = 5000 per shard
            LIMIT_FLAG="--limit-teams 5000"
          elif [[ "$LIMIT_TEAMS" =~ ^[0-9]+$ ]] && [ "$LIMIT_TEAMS" -ge 5000 ]; then
            LIMIT_FLAG="--limit-teams $(( LIMIT_TEAMS / 5 ))"
          elif [[ "$LIMIT_TEAMS" =~ ^[0-9]+$ ]]; then
            # Small manual run: SCRAPE_SHARD_COUNT=1, hash filter is a no-op,
            # shard 0 runs the full unsharded amount.
            LIMIT_FLAG="--limit-teams $LIMIT_TEAMS"
          fi
          # If LIMIT_FLAG is empty, the CLI omits --limit-teams and falls
          # through to incremental mode (7-day stale filter) — matches the
          # prior workflow's semantics for manual dispatch with no inputs.
          CMD="$CMD $LIMIT_FLAG"

          if [ "$NULL_TEAMS_ONLY" = "true" ]; then
            CMD="$CMD --null-teams-only"
          fi

          # YYYY-MM-DD only — guards against shell-meta in the date input.
          if [[ "$SINCE_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            CMD="$CMD --since-date $SINCE_DATE"
          fi

          # Chain links (cron seed + dispatched follow-ups) always pass
          # --include-recent so the RPC's 7-day staleness gate doesn't shadow
          # teams scraped 6.x days ago by the previous Monday's chain.
          # Manual one-off dispatches still respect the workflow_dispatch input.
          if [ "$IS_CHAIN_LINK" = "true" ] || [ "$INCLUDE_RECENT" = "true" ]; then
            CMD="$CMD --include-recent"
          fi

          # Concurrency: 10 per shard, single-shard or sharded.
          # The CloudFront WAF on system.gotsport.com/api/v1/* trips at ~15 req/s
          # sustained from one IP. The 2026-05-18 chain at 20 per shard had a 97%
          # error rate from WAF blocks (silent failures pre-circuit-breaker). 10
          # concurrent + 1.5-2.5s per-team delay stays comfortably under threshold.
          # Sharded mode runs each shard on a separate IP so 10 × 5 = 50 aggregate.
          CONCURRENCY=10
          if [[ "$CONCURRENCY_INPUT" =~ ^[0-9]+$ ]] && [ "$SCRAPE_SHARD_COUNT" = "1" ]; then
            CONCURRENCY="$CONCURRENCY_INPUT"
          fi
          CMD="$CMD --concurrency $CONCURRENCY"

          echo "Shard ${SCRAPE_SHARD_INDEX}/${SCRAPE_SHARD_COUNT}: $CMD"
          echo "command=$CMD" >> "$GITHUB_OUTPUT"

      - name: Run scrape + auto-import
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          PYTHONPATH:                ${{ github.workspace }}
          # GotSportScraper reads ZENROWS_API_KEY at __init__ and routes API
          # calls through the residential proxy when set. Gated on the
          # use_zenrows workflow input so we can A/B without flipping the
          # default. Schedule + chain links default to direct (use_zenrows=false).
          ZENROWS_API_KEY: ${{ inputs.use_zenrows && secrets.ZENROWS_API_KEY || '' }}
          # premium_proxy=true → ZenRows residential IPs ("protected" billing,
          # ~25x more expensive). false → datacenter IPs ("standard" billing).
          # Only read by the scraper when ZENROWS_API_KEY is set.
          ZENROWS_PREMIUM_PROXY: ${{ inputs.zenrows_premium_proxy && 'true' || 'false' }}
        run: ${{ steps.build-command.outputs.command }}

      - name: Upload scraped data
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: scraped-games-${{ github.run_number }}-shard-${{ matrix.shard }}
          path: data/raw/scraped_games_*.jsonl
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: scrape-logs-${{ github.run_number }}-shard-${{ matrix.shard }}
          path: logs/*.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Report results
        if: always()
        run: |
          echo "===================="
          echo "Scrape shard ${SCRAPE_SHARD_INDEX}/${SCRAPE_SHARD_COUNT} completed"
          echo "===================="
          if [ -n "${{ inputs.chain_remaining }}" ] && [ "${{ inputs.chain_remaining }}" != "0" ]; then
            echo "Teams limit: 5000 per shard × 5 shards = 25000 (chain link, ${{ inputs.chain_remaining }} remaining)"
          else
            echo "Teams limit input: ${{ inputs.limit_teams || 'empty (incremental mode)' }}"
          fi
          echo "Null teams only: ${{ inputs.null_teams_only }}"
          echo "Include recent (override 7-day filter): ${{ inputs.include_recent }}"
          echo "Concurrency input: ${{ inputs.concurrency }}"
          echo "Check artifacts for scraped data and logs"

  finalize:
    # Single-job tail after the matrix shards. Hosts the chain dispatcher so it
    # fires once per run instead of once per shard.
    needs: [prepare, scrape-and-import]
    if: ${{ always() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # `actions: write` lets the "Dispatch next chain link" step trigger this
    # workflow's next link via `gh workflow run`. `contents: read` is declared
    # explicitly so the added scope doesn't widen the rest of the token.
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch next chain link
        # Fires only when:
        #   (a) an earlier dispatch set chain_remaining > 0; AND
        #   (b) every shard's scrape-and-import succeeded.
        # Manual one-off dispatches without chain_remaining stay non-chaining.
        #
        # The workflow-level concurrency group (game-scraping, cancel-in-progress: false)
        # queues the next dispatched run behind this one, so links execute strictly
        # serially — link N+1 will not start until link N's run is fully complete.
        #
        # Chain usage: dispatch with chain_remaining=N for an N-link chain
        # totaling N × 25,000 teams. The originally-documented 150K full-sweep
        # is chain_remaining=6 (this run + 5 dispatched follow-ups). Each link
        # scrapes 25,000 teams (5,000 per shard × 5 shards). chain_remaining
        # decrements by 1 each step until it reaches 0, which terminates the
        # chain (the gate below blocks dispatching when chain_remaining ≤ 0).
        # The Sunday-night automated seed was removed — chains are now
        # operator-initiated.
        if: ${{ inputs.chain_remaining != '' && inputs.chain_remaining != '0' && needs.scrape-and-import.result == 'success' }}
        env:
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          CHAIN_REMAINING: ${{ inputs.chain_remaining }}
        run: |
          NEXT_REMAINING=$(( CHAIN_REMAINING - 1 ))

          if [ "$NEXT_REMAINING" -le 0 ]; then
            echo "Chain complete (next would be chain_remaining=$NEXT_REMAINING)."
            exit 0
          fi

          echo "Dispatching next chain link (chain_remaining=$NEXT_REMAINING)"
          # --repo is required because this job has no checkout step; without
          # it `gh` looks for a local git repo and exits with
          # `fatal: not a git repository`.
          gh workflow run scrape-games.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${GITHUB_REF_NAME}" \
            -f chain_remaining="$NEXT_REMAINING"
