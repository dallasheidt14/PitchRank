name: Calculate Rankings

on:
  schedule:
    # Run every Monday at 6:30 AM Mountain Time (12:30 UTC MDT / 13:30 UTC MST).
    # Anchored to MDT — runs at 5:30 AM MST in winter.
    # Sequenced after the two Monday hygiene jobs (4 AM + 5 AM MT).
    - cron: '30 12 * * 1'
  workflow_run:
    # Also trigger after Modular11 scrape+import workflows complete
    # This ensures HD/MLS NEXT games are ingested before rankings run
    workflows:
      - "Modular11 Weekly Scrape"
      - "Modular11 Events Weekly Scrape"
    types:
      - completed
  workflow_dispatch:
    inputs:
      engine:
        description: 'Ranking engine to use'
        required: false
        default: 'glicko'
        type: choice
        options:
          - glicko
          - v53e

# Prevent concurrent ranking calculations — if a scrape-triggered ranking
# is still running when the scheduled one fires, the scheduled one will queue.
# This also prevents two manual triggers from corrupting each other's writes.
concurrency:
  group: ranking-calculation
  cancel-in-progress: false  # Don't cancel in-progress runs; queue instead

jobs:
  calculate-rankings:
    runs-on: ubuntu-latest
    # Run on schedule/manual dispatch always, but only after successful workflow_run triggers
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      # ---------------------------------------------------------------
      # 1. CHECKOUT THE MAIN BRANCH
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}  # workflow_dispatch: branch selected in UI; schedule/workflow_run: default branch
          fetch-depth: 0

      # ---------------------------------------------------------------
      # 2. FAIL-SAFE: VERIFY WE ARE ON THE RIGHT BRANCH
      # ---------------------------------------------------------------
      - name: Verify branch
        run: |
          BRANCH=$(git branch --show-current)
          echo "Checked-out branch: $BRANCH"
          echo "Trigger: ${{ github.event_name }}"
          echo "Engine: ${{ github.event.inputs.engine || 'glicko' }}"
          # Non-dispatch triggers (schedule, workflow_run) must run on main
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$BRANCH" != "main" ]; then
            echo "❌ ERROR: Non-dispatch trigger on branch '$BRANCH' — expected 'main'. Aborting."
            exit 1
          fi

      # ---------------------------------------------------------------
      # 3. PRINT COMMIT HASH (for debugging + traceability)
      # ---------------------------------------------------------------
      - name: Show commit hash
        run: |
          echo "Current commit:"
          git rev-parse HEAD

      # ---------------------------------------------------------------
      # 4. SET UP PYTHON ENVIRONMENT
      # ---------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # ---------------------------------------------------------------
      # 5. INSTALL PYTHON DEPENDENCIES
      # ---------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            for attempt in 1 2 3; do
              echo "Installing Python dependencies (attempt $attempt/3)..."
              python -m pip install --retries 10 --timeout 120 --prefer-binary -r requirements.txt && break
              if [ "$attempt" -eq 3 ]; then
                echo "Dependency install failed after 3 attempts"
                exit 1
              fi
              echo "pip install failed, purging cache and retrying..."
              python -m pip cache purge || true
              sleep $((attempt * 15))
            done
          fi
          # Verify critical packages are installed
          python -c "import supabase, pandas, numpy, sklearn, rich; print('✅ All critical imports successful')"

      # ---------------------------------------------------------------
      # 6. PRE-FLIGHT: Verify no scrape jobs are still running
      # ---------------------------------------------------------------
      - name: Check for active scrape workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Checking for active Scrape Games workflows..."
          ACTIVE_RUNS=$(gh run list --workflow=scrape-games.yml --status=in_progress --json databaseId --jq 'length' 2>/dev/null || echo "0")
          if [ "$ACTIVE_RUNS" -gt 0 ]; then
            echo "⚠️  WARNING: $ACTIVE_RUNS scrape workflow(s) still running!"
            echo "Rankings will proceed but may be calculated on incomplete data."
            echo "Consider re-running rankings after scraping completes."
          else
            echo "✅ No active scrape workflows — safe to calculate rankings"
          fi

      # ---------------------------------------------------------------
      # 7. RUN THE ACTIVE RANKINGS ENGINE (Glicko-2 + ML + post-convergence SOS/SCF)
      # ---------------------------------------------------------------
      - name: Calculate Rankings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PYTHONUNBUFFERED: "1"  # Force Python to output logs immediately
          RECORD_RECONCILE_ENABLED: "true"
          RECORD_RECONCILE_DOWNPULL_K: "0.7"
        run: |
          export PYTHONPATH="${PYTHONPATH}:${PWD}"
          echo "⚽ Running PitchRank Rankings Engine (Glicko-2 + ML + post-convergence SOS/SCF)"
          echo "Python version: $(python --version)"
          echo "Current directory: $(pwd)"
          echo "SUPABASE_URL configured: $([[ -n "$SUPABASE_URL" ]] && echo 'Yes' || echo 'No')"
          python scripts/calculate_rankings.py --ml --force-rebuild --engine ${{ github.event.inputs.engine || 'glicko' }} || {
            echo "❌ Rankings calculation failed with exit code $?"
            exit 1
          }

      # ---------------------------------------------------------------
      # 7. FINAL REPORT
      # ---------------------------------------------------------------
      - name: Report results
        if: always()
        run: |
          echo "Rankings calculation completed. Check logs above for details."

