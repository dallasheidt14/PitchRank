name: Check Stuck Signups

on:
  schedule:
    # Run every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print digest, no email)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  PYTHONUNBUFFERED: '1'

jobs:
  check-stuck-signups:
    name: Stuck Signup Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Dependencies installed"

      - name: Verify secrets
        run: |
          echo "SUPABASE_URL set: $([ -n "$SUPABASE_URL" ] && echo yes || echo no)"
          echo "SUPABASE_SERVICE_KEY set: $([ -n "$SUPABASE_SERVICE_KEY" ] && echo yes || echo no)"
          echo "RESEND_API_KEY set: $([ -n "$RESEND_API_KEY" ] && echo yes || echo no)"
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ] || [ -z "$RESEND_API_KEY" ]; then
            echo "::error::Missing required secrets (SUPABASE_URL, SUPABASE_SERVICE_KEY, RESEND_API_KEY)"
            exit 1
          fi

      - name: Run stuck signup monitor
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/check_stuck_signups.py $DRY_RUN_FLAG

      - name: Summary
        if: always()
        run: |
          echo "## Stuck Signup Monitor" >> $GITHUB_STEP_SUMMARY
          echo "Completed at $(date -u)" >> $GITHUB_STEP_SUMMARY
