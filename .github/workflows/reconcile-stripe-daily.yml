name: Reconcile Stripe Subscriptions

on:
  schedule:
    # Run daily at 6:00 AM UTC (11:00 PM MST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (check only, no writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  PYTHONUNBUFFERED: '1'

jobs:
  reconcile:
    name: Stripe Subscription Reconciliation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Dependencies installed"

      - name: Verify secrets
        run: |
          echo "SUPABASE_URL set: $([ -n "$SUPABASE_URL" ] && echo yes || echo no)"
          echo "SUPABASE_SERVICE_KEY set: $([ -n "$SUPABASE_SERVICE_KEY" ] && echo yes || echo no)"
          echo "STRIPE_SECRET_KEY set: $([ -n "$STRIPE_SECRET_KEY" ] && echo yes || echo no)"
          echo "RESEND_API_KEY set: $([ -n "$RESEND_API_KEY" ] && echo yes || echo no)"
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ] || [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "::error::Missing required secrets (SUPABASE_URL, SUPABASE_SERVICE_KEY, STRIPE_SECRET_KEY)"
            exit 1
          fi

      - name: Run Stripe reconciliation
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/reconcile_stripe_subscriptions.py $DRY_RUN_FLAG

      - name: Summary
        if: always()
        run: |
          echo "## Stripe Subscription Reconciliation" >> $GITHUB_STEP_SUMMARY
          echo "Completed at $(date -u)" >> $GITHUB_STEP_SUMMARY
