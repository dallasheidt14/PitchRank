name: Process Missing Games

on:
  schedule:
    # Offset from :00/:15/:30/:45 to reduce GitHub scheduler contention.
    # Scheduled workflows are best-effort and silently dropped under load;
    # round-number minutes collide with every other repo using */15.
    - cron: '7,22,37,52 * * * *'  # every 15 minutes, off-peak offsets
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

concurrency:
  group: process-missing-games
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install core dependencies
          pip install supabase python-dotenv pandas requests rich certifi numpy beautifulsoup4
      
      - name: Process missing games
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          # Set Python path to include project root
          export PYTHONPATH="${PYTHONPATH}:${PWD}"
          # Run with explicit error output
          python scripts/process_missing_games.py --limit 40 || exit 1
      
      - name: Report results
        if: always()
        run: |
          echo "Processing completed. Check logs above for details."

