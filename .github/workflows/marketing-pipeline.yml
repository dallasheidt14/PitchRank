name: Marketing Pipeline

on:
  workflow_run:
    # Chain to Calculate Rankings — runs after rankings complete
    workflows: ["Calculate Rankings"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate content without publishing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  marketing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # DISABLED: Marketing pipeline temporarily turned off
    if: false
    # Original condition (restore when re-enabling):
    # if: >-
    #   github.event_name == 'workflow_dispatch' ||
    #   (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      # ---------------------------------------------------------------
      # 1. CHECKOUT
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # 2. GIT CONFIG (for blog post commit)
      # ---------------------------------------------------------------
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ---------------------------------------------------------------
      # 3. PYTHON SETUP
      # ---------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase python-dotenv requests rich tweepy markdown

      # ---------------------------------------------------------------
      # 4. RUN PIPELINE
      # ---------------------------------------------------------------
      - name: Run marketing pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          PITCHRANK_URL: 'https://pitchrank.io'
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/marketing_pipeline.py $DRY_RUN_FLAG

      # ---------------------------------------------------------------
      # 5. UPLOAD ARTIFACTS
      # ---------------------------------------------------------------
      - name: Upload marketing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketing-output
          path: |
            artifacts/newsletter_*.html
            artifacts/social_posts_*.json
          retention-days: 30
