name: Marketing Pipeline

on:
  workflow_run:
    # Chain to Calculate Rankings — runs after rankings complete
    workflows: ["Calculate Rankings"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate content without publishing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  marketing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Manual-dispatch only during Postiz migration validation.
    # After two clean cycles, drop this `if:` so the workflow_run trigger re-enables.
    if: github.event_name == 'workflow_dispatch'
    # Original condition (restore when re-enabling auto-trigger):
    # if: >-
    #   github.event_name == 'workflow_dispatch' ||
    #   (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      # ---------------------------------------------------------------
      # 1. CHECKOUT
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # 2. GIT CONFIG (for blog post commit)
      # ---------------------------------------------------------------
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ---------------------------------------------------------------
      # 3. PYTHON SETUP
      # ---------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase python-dotenv requests rich markdown

      # ---------------------------------------------------------------
      # 3b. NODE SETUP (for blog formatting + llms.txt regeneration)
      # ---------------------------------------------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # ---------------------------------------------------------------
      # 4. RUN PIPELINE
      # ---------------------------------------------------------------
      - name: Run marketing pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          BEEHIIV_NEWSLETTER_ENABLED: ${{ vars.BEEHIIV_NEWSLETTER_ENABLED || 'false' }}
          POSTIZ_API_KEY: ${{ secrets.POSTIZ_API_KEY }}
          POSTIZ_DRAFTS_ENABLED: ${{ vars.POSTIZ_DRAFTS_ENABLED || 'true' }}
          POSTIZ_TAG_INCLUDE_AUTO_APPROVED: 'true'
          PITCHRANK_URL: 'https://pitchrank.io'
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/marketing_pipeline.py $DRY_RUN_FLAG

      # ---------------------------------------------------------------
      # 5. TRIGGER VERCEL DEPLOY
      # The blog commit is pushed with GITHUB_TOKEN, which does not fire
      # Vercel's git webhook — the post would not go live until the next
      # deploy. POST the deploy hook to ship it. No-ops if the secret is
      # not configured, and is skipped on dry runs.
      # ---------------------------------------------------------------
      - name: Trigger Vercel deploy
        if: success() && github.event.inputs.dry_run != 'true'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL" && echo "Vercel deploy triggered"
          else
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping deploy trigger"
          fi

      # ---------------------------------------------------------------
      # 6. UPLOAD ARTIFACTS
      # ---------------------------------------------------------------
      - name: Upload marketing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketing-output
          path: |
            artifacts/newsletter_*.html
            artifacts/social_posts_*.json
          retention-days: 30
