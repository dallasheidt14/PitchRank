name: Fix Age Year Discrepancies

on:
  # Schedule removed: now runs as Step 6 of data-hygiene-weekly (Tuesday)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (scan only, no writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      run_normalization_first:
        description: 'Run team name normalization (Step 1) before fixing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      team_name:
        description: 'Optional: Fix only teams matching this name (partial match)'
        required: false
        type: string

# ─────────────────────────────────────────────────────────────
# Pipeline: Team name normalization → Age group fix
#
#   Step 1 (optional): normalize_team_names.py — Converts 14B→2014, etc.
#   Step 2: fix_team_age_groups.py — Fix age_group from birth year in name
#
# Why run Step 1 first: fix_team_age_groups extracts birth year via regex
# (20XX). normalize_team_names converts "14B"→"2014" so extraction works.
# ─────────────────────────────────────────────────────────────

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  PYTHONUNBUFFERED: '1'

jobs:
  fix-age-groups:
    name: Fix Age Year Discrepancies
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Setup ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install supabase psycopg2-binary python-dotenv
          echo "✅ Dependencies installed"

      - name: Verify Supabase secrets
        run: |
          echo "SUPABASE_URL is set: $([ -n "$SUPABASE_URL" ] && echo yes || echo no)"
          echo "SUPABASE_KEY is set: $([ -n "$SUPABASE_KEY" ] && echo yes || echo no)"
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::error::Missing secrets. Add SUPABASE_URL and SUPABASE_SERVICE_KEY."
            exit 1
          fi

      - name: Create logs directory
        run: mkdir -p logs

      # ── Step 1: Normalize Team Names (optional) ───────────
      - name: 'Step 1: Normalize Team Names'
        id: step1
        if: ${{ github.event.inputs.run_normalization_first != 'false' }}
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 1: NORMALIZE TEAM NAMES"
          echo "═══════════════════════════════════════════════════"

          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          python scripts/normalize_team_names.py --all-teams $DRY_RUN_FLAG 2>&1 | tee logs/step1_normalize_names.log

          NORMALIZED=$(grep -oP '(Would update|Updated): \K\d+' logs/step1_normalize_names.log || echo "0")
          echo "teams_normalized=$NORMALIZED" >> $GITHUB_OUTPUT

      # ── Step 2: Fix Age Group Discrepancies ─────────────────
      - name: 'Step 2: Fix age group discrepancies'
        id: step2
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          TEAM_NAME: ${{ github.event.inputs.team_name }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "STEP 2: FIX AGE GROUP DISCREPANCIES"
          echo "═══════════════════════════════════════════════════"

          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          EXTRA_ARGS=()
          if [ -n "$TEAM_NAME" ]; then
            EXTRA_ARGS+=(--team-name "$TEAM_NAME")
          fi

          python scripts/fix_team_age_groups.py $DRY_RUN_FLAG "${EXTRA_ARGS[@]}" 2>&1 | tee logs/step2_fix_age.log || {
            echo "❌ Age group fix script failed with exit code $?"
            exit 1
          }

          FIXED=$(grep -oP 'SUMMARY: Fixed \K\d+' logs/step2_fix_age.log || grep -oP 'Found \K\d+(?= teams with age)' logs/step2_fix_age.log || echo "0")
          echo "teams_fixed=$FIXED" >> $GITHUB_OUTPUT

      # ── Artifacts ─────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: fix-age-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      # ── Summary ───────────────────────────────────────────
      - name: Pipeline Summary
        if: always()
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          TEAMS_NORMALIZED: ${{ steps.step1.outputs.teams_normalized }}
          TEAMS_FIXED: ${{ steps.step2.outputs.teams_fixed }}
        run: |
          if [ "$DRY_RUN" == "true" ]; then
            MODE="🔍 Dry Run"
          else
            MODE="⚡ Live"
          fi

          echo "## 🔧 Fix Age Year Discrepancies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** $MODE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Task | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Normalize Team Names | ${TEAMS_NORMALIZED:-skipped} normalized |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Fix Age Groups | ${TEAMS_FIXED:-0} fixed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Integration" >> $GITHUB_STEP_SUMMARY
          echo "Step 1 converts 14B→2014 so Step 2 can extract birth year from team names." >> $GITHUB_STEP_SUMMARY
          if [ "$DRY_RUN" != "true" ] && [ "$TEAMS_FIXED" != "0" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Recalculate rankings** for affected teams after merge." >> $GITHUB_STEP_SUMMARY
          fi
